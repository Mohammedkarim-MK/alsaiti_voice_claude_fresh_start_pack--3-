<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#123A2C"/>
<!-- CSP: default-src 'none' locks everything down; nothing external can load or be contacted.
     connect-src MUST list the backend or the browser blocks every fetch() (Supabase Auth +
     Edge Functions). NOTE: frame-ancestors (clickjacking) only works as an HTTP header, which
     GitHub Pages cannot set — add it at the CDN/host when this moves to a real server. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; font-src data:; connect-src 'self' https://*.supabase.co; media-src data: blob:; base-uri 'none'; form-action 'self'; object-src 'none'; frame-src 'none'"/>
<meta name="referrer" content="no-referrer"/>
<meta name="description" content="Alsaiti Growth — AI receptionists &amp; lead systems that turn enquiries into booked clients. Live trilingual demo (EN / ES / AR)."/>
<meta property="og:title" content="Alsaiti Growth — AI receptionist &amp; lead dashboard"/>
<meta property="og:description" content="AI systems that answer calls, capture leads, follow up automatically, and show everything in a live dashboard."/>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%3E%3Crect%20width%3D%2224%22%20height%3D%2224%22%20rx%3D%226%22%20fill%3D%22%2523123A2C%22%2F%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%3E%3Crect%20x%3D%229%22%20y%3D%223%22%20width%3D%226%22%20height%3D%2211%22%20rx%3D%223%22%2F%3E%3Cpath%20d%3D%22M5%2011a7%207%200%200%200%2014%200M12%2018v3%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E"/>
<title>Alsaiti Growth — AI receptionist & lead dashboard</title>
<style>
  :root{
    /* ===== LIGHT — Private Wealth: ivory / forest / green / brass (thin) ===== */
    --bg:#F7F2E7; --bg2:#EFE8D7; --primary:#1C6B4E; --cyan:#2E8A66; --glow:#123A2C;
    --purple:#C6A15B; --accent:#C6A15B; --brass:#C6A15B; --heading:#14231C; --text:#22322A; --muted:#6E7A6A;
    --glass:#FFFFFF; --glass-hi:#FCF9F1; --card:#FFFFFF; --card2:#F3EEDF; --sidebar:#FCF9F1; --topbar:rgba(252,249,241,.85);
    --border:rgba(20,35,28,0.11); --border-hi:rgba(28,107,78,0.42);
    --green:#1C6B4E; --amber:#A8791F; --red:#B4553E;
    --glassborder:rgba(20,35,28,0.09); --glasshi:rgba(255,255,255,0.92);
    --shadow:rgba(18,42,32,0.16); --shadow2:rgba(18,42,32,0.06);
    /* charts — VALIDATED ordinal ramp (single hue, monotone L, light end clears surface)
       for the ordered pipeline, plus reserved status tokens for the terminal states. */
    --st-new:#57B892; --st-contacted:#38A279; --st-qualified:#238662; --st-booked:#156548;
    --st-won:#0D4531; --st-lost:#C0553C; --st-spam:#8A9096;
    --fn1:#57B892; --fn2:#38A279; --fn3:#238662; --fn4:#156548; --fn5:#0D4531; --fntext:#F2EBDC;
    --chart-track:rgba(20,35,28,.08); --chart-grid:rgba(20,35,28,.07);
    color-scheme:light; /* native controls (dropdowns, inputs, scrollbars) render light */
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    /* logo monogram — faceted forest greens (top-left lit → bottom-right shadow), ivory seams, brass */
    --lf1:#2E8A66;--lf2:#237A57;--lf3:#1C6B4E;--lf4:#155941;--lf5:#104735;--lf6:#0B3728;
    --lfgA:#C6A15B;--lfgB:#A9822F;--lseam:#F7F2E7;
  }
  :root[data-theme="dark"]{
    /* ===== DARK — Modern Fintech: charcoal / electric emerald / cool white ===== */
    --bg:#0C100E; --bg2:#0F1512; --primary:#16C98A; --cyan:#22E39A; --glow:#0FA372;
    --purple:#22E39A; --accent:#22E39A; --brass:#22E39A; --heading:#EAF2EE; --text:#DCE7E1; --muted:#8A9A92;
    --glass:#151B18; --glass-hi:#1B2320; --card:#151B18; --card2:#1A211D; --sidebar:rgba(12,16,14,.92); --topbar:rgba(12,16,14,.85);
    --border:rgba(234,242,238,0.10); --border-hi:rgba(34,227,154,0.40);
    --green:#22E39A; --amber:#D9B45A; --red:#E58063;
    --glassborder:rgba(234,242,238,0.08); --glasshi:rgba(255,255,255,0.05);
    --shadow:rgba(0,0,0,0.55); --shadow2:rgba(0,0,0,0.34);
    /* charts — VALIDATED dark ordinal ramp (dim→electric, all checks pass on charcoal) */
    --st-new:#16795A; --st-contacted:#0FA372; --st-qualified:#16C98A; --st-booked:#22E39A;
    --st-won:#7FF0CB; --st-lost:#E58063; --st-spam:#9AA5AA;
    --fn1:#16795A; --fn2:#0FA372; --fn3:#16C98A; --fn4:#22E39A; --fn5:#7FF0CB; --fntext:#06231A;
    --chart-track:rgba(234,242,238,.10); --chart-grid:rgba(234,242,238,.08);
    color-scheme:dark; /* FIX: native controls render dark — no more black text in dark mode */
    /* logo monogram — electric emeralds on charcoal, near-black seams, warm brass accent */
    --lf1:#3DEFAE;--lf2:#22E39A;--lf3:#16C98A;--lf4:#12AC77;--lf5:#0E8A63;--lf6:#0A6A4E;
    --lfgA:#D9BC77;--lfgB:#BE9A4A;--lseam:#0C100E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(1200px 600px at 82% -10%, rgba(10,135,92,.20), transparent 60%),
                     radial-gradient(900px 500px at -10% 20%, rgba(28,107,78,.11), transparent 55%);
  }
  html[dir="rtl"] body{font-family:"Segoe UI","Noto Naskh Arabic",Tahoma,-apple-system,sans-serif}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  .muted{color:var(--muted)}
  .app{display:flex;min-height:100vh}

  /* Sidebar */
  .sidebar{width:246px;flex-shrink:0;background:rgba(7,23,53,.75);border-right:1px solid var(--border);
    padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;font-weight:700;font-size:17px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--glow));
    display:grid;place-items:center;box-shadow:0 0 18px rgba(28,107,78,.55);flex-shrink:0}
  .brand .logo svg{width:18px;height:18px}
  .navsec{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 10px 6px}
  .navlink{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);
    font-size:14px;cursor:pointer;transition:.15s;border:1px solid transparent;width:100%;background:none;text-align:left}
  html[dir="rtl"] .navlink{text-align:right}
  .navlink svg{width:18px;height:18px;flex-shrink:0}
  .navlink:hover{background:rgba(28,107,78,.10);color:var(--text)}
  .navlink.active{background:linear-gradient(90deg,rgba(28,107,78,.22),rgba(28,107,78,.05));
    color:var(--text);border-color:var(--border)}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:13px 20px;background:rgba(2,11,31,.72);border-bottom:1px solid var(--border);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
  .hamb{display:none;background:none;border:1px solid var(--border);color:var(--text);border-radius:9px;
    width:38px;height:38px;font-size:18px;cursor:pointer}
  .search{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:var(--glass);
    border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--muted)}
  .search svg{width:17px;height:17px;flex-shrink:0}
  .search input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:14px}
  .topbar .spacer{flex:1}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--glass);
    display:grid;place-items:center;cursor:pointer;color:var(--muted);position:relative}
  .iconbtn svg{width:18px;height:18px}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--glow));
    display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
  .content{padding:22px;max-width:1160px;width:100%;margin:0 auto}
  .pagehead{margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .pagehead h1{font-size:24px;font-weight:800}
  .pagehead p{color:var(--muted);margin-top:4px;font-size:14px}
  .pagehead .spacer{flex:1}

  /* Language switch */
  .langsw{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--glass)}
  .langsw button{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 11px;cursor:pointer;transition:.15s}
  .langsw button.on{background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff}
  .langsw button:hover:not(.on){color:var(--text)}

  /* Cards / grid */
  .grid{display:grid;gap:16px}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .cols-2{grid-template-columns:repeat(2,1fr)}
  .card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:18px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .stat .label{font-size:13px;color:var(--muted)}
  .stat .value{font-size:30px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .delta{font-size:12px;margin-top:6px}
  .up{color:var(--green)}.down{color:var(--red)}
  .card h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:999px;
    border:1px solid var(--border);white-space:nowrap;font-weight:600}
  .b-New{background:rgba(28,107,78,.16);color:var(--cyan);border-color:rgba(46,138,102,.4)}
  .b-Contacted{background:rgba(90,104,112,.13);color:#516069}
  .b-Qualified{background:rgba(168,121,31,.15);color:#8A6416}
  .b-Booked{background:rgba(92,196,151,.14);color:#7bf0b4}
  .b-Won{background:rgba(92,196,151,.2);color:var(--green)}
  .b-Lost{background:rgba(255,122,138,.14);color:#ff9aa6}
  .b-Spam{background:rgba(148,163,199,.1);color:#8ea0bd}

  /* Table */
  .tablewrap{overflow-x:auto;border-radius:16px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px}
  thead th{text-align:left;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
    padding:12px 14px;background:rgba(7,23,53,.6)}
  tbody td{padding:13px 14px;border-top:1px solid var(--border)}
  tbody tr{cursor:pointer;transition:.12s}
  tbody tr:hover{background:rgba(28,107,78,.07)}
  .src{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
  .src svg{width:15px;height:15px}
  .score{font-weight:700;font-variant-numeric:tabular-nums}
  .name{font-weight:600}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:11px;
    font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--glass);color:var(--text);transition:.15s}
  .btn:hover{border-color:var(--primary)}
  .btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .btn svg{width:16px;height:16px}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--glow));border:none;color:#fff;
    box-shadow:0 6px 22px rgba(10,135,92,.4)}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-sm{padding:7px 12px;font-size:13px}
  .btn-lg{padding:13px 22px;font-size:15px}
  .btn-ghost{background:none}
  .btn-danger{border-color:rgba(255,122,138,.5);color:#ff9aa6}
  .btn-danger:hover{background:rgba(255,122,138,.12);border-color:var(--red)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}

  .bar{height:9px;border-radius:999px;background:rgba(148,163,199,.18);overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--cyan))}
  .legendrow{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin:11px 0;gap:10px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}

  /* Forms */
  .field{margin:14px 0}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border-radius:11px;background:var(--card2);
    border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
  .field textarea{resize:vertical;min-height:72px}
  .field .err{color:#ff9aa6;font-size:12.5px;margin-top:6px;display:none}
  .field.invalid .err{display:block}
  .field.invalid input{border-color:var(--red)}

  /* Auth */
  .auth{min-height:100vh;display:grid;place-items:center;padding:24px}
  .authcard{width:100%;max-width:410px;background:var(--glass);border:1px solid var(--border);
    border-radius:20px;padding:28px;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .authcard h2{text-align:center;font-size:21px;margin-top:8px}
  .link{color:var(--cyan);cursor:pointer}

  /* Empty state */
  .empty{text-align:center;padding:44px 20px;color:var(--muted)}
  .empty .ic{width:56px;height:56px;border-radius:16px;background:rgba(28,107,78,.14);display:grid;place-items:center;
    color:var(--cyan);margin:0 auto 14px}
  .empty .ic svg{width:26px;height:26px}

  /* Toast */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:200;
    background:var(--glass-hi);border:1px solid var(--border-hi);color:var(--text);padding:12px 18px;border-radius:12px;
    font-size:14px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:9px;
    opacity:0;pointer-events:none;transition:.28s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast svg{width:17px;height:17px;color:var(--green)}

  .kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--border);font-size:14px}
  .kv:first-child{border-top:none}
  .kv .k{color:var(--muted)}

  .mobnav{display:none}
  .backdrop{display:none}

  @media(max-width:900px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}.cols-2{grid-template-columns:1fr}}
  @media(max-width:760px){
    .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:.25s}
    html[dir="rtl"] .sidebar{left:auto;right:0;transform:translateX(100%)}
    .sidebar.open{transform:translateX(0)}
    .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50}
    .hamb{display:grid;place-items:center}
    .content{padding:16px 14px 96px}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;
      background:rgba(7,23,53,.94);border-top:1px solid var(--border);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
      padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
    .mobnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);
      padding:4px;background:none;border:none;cursor:pointer}
    .mobnav button svg{width:21px;height:21px}
    .mobnav button.active{color:var(--cyan)}
    .search{display:none}
    .pagehead h1{font-size:20px}
    .stat .value{font-size:26px}
  }
  /* responsive lead list */
  .leadlist{display:flex;flex-direction:column;gap:10px}
  .leaditem{display:flex;gap:12px;align-items:center;text-align:left;width:100%;cursor:pointer;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:12px 14px;color:var(--text);transition:.12s}
  html[dir="rtl"] .leaditem{text-align:right}
  html[dir="rtl"] .sidebar{border-right:none;border-left:1px solid var(--border)}
  html[dir="rtl"] .li-meta .score{margin-left:0!important;margin-right:auto!important}
  .leaditem:hover{border-color:var(--primary);background:rgba(28,107,78,.06)}
  .leaditem .av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--glow))}
  .li-main{flex:1;min-width:0;display:flex;flex-direction:column}
  .li-top{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .li-sub{color:var(--muted);font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-meta{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .searchbtn{cursor:pointer;text-align:left}
  html[dir="rtl"] .searchbtn{text-align:right}
  .searchbtn span{color:var(--muted);font-size:14px}

  /* voice assistant */
  .voicecard{text-align:center}
  .vstatus{font-size:14px;color:var(--muted);margin-bottom:18px;min-height:20px}
  .vmic{width:96px;height:96px;border-radius:50%;border:none;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--primary),var(--glow));box-shadow:0 10px 34px rgba(10,135,92,.5);display:grid;place-items:center;margin:0 auto}
  .vmic svg{width:38px;height:38px}
  .vmic.on{animation:vpulse 1.2s infinite;background:linear-gradient(135deg,#ff7a8a,#ff5f57)}
  @keyframes vpulse{0%{box-shadow:0 0 0 0 rgba(255,122,138,.55)}70%{box-shadow:0 0 0 22px rgba(255,122,138,0)}100%{box-shadow:0 0 0 0 rgba(255,122,138,0)}}
  #vspeak.on{border-color:var(--red);color:#ff9aa6;background:rgba(255,122,138,.12)}
  .vlang{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
  .vgender{display:inline-flex;align-items:center;gap:6px;margin:0 auto 18px;padding:4px;border:1px solid var(--border);border-radius:999px;background:var(--card2)}
  .vgender .vgl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:0 8px 0 10px}
  .vgender button{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--muted);background:none;border:none;border-radius:999px;padding:7px 14px;cursor:pointer;transition:background .18s,color .18s}
  .vgender button svg{width:13px;height:13px}
  .vgender button.on{background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff;box-shadow:0 4px 12px -4px rgba(28,107,78,.5)}
  :root[data-theme="dark"] .vgender button.on{color:#08130D}
  .vhuman{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:999px;padding:7px 14px;cursor:pointer;transition:all .18s}
  .vhuman svg{width:13px;height:13px}
  .vhuman.on{color:var(--brass);border-color:rgba(198,161,91,.4);background:rgba(198,161,91,.1)}
  :root[data-theme="dark"] .vhuman.on{color:var(--primary);border-color:var(--border-hi);background:rgba(34,227,154,.08)}
  .vtranscript{max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:8px}
  .vmsg{max-width:85%;padding:9px 13px;border-radius:13px;font-size:14px;line-height:1.4}
  .vmsg.bot{background:var(--glass-hi);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
  .vmsg.user{background:linear-gradient(135deg,rgba(28,107,78,.92),rgba(10,135,92,.92));color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
  html[dir="rtl"] .vmsg.bot{border-bottom-left-radius:13px;border-bottom-right-radius:4px}
  html[dir="rtl"] .vmsg.user{border-bottom-right-radius:13px;border-bottom-left-radius:4px}
  .vreply{display:flex;gap:8px;margin-top:16px}

  /* landing */
  .landing{max-width:1120px;margin:0 auto;padding:20px 20px 60px}

  /* dashboard preview */
  .dashprev{margin-top:26px;border:1px solid var(--border);border-radius:20px;padding:18px;background:linear-gradient(180deg,rgba(7,23,53,.7),rgba(11,27,58,.5))}
  .dashprev .row-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .miniStat{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px}

  .plan .setup{font-size:12.5px;color:var(--muted);margin-top:4px}

  .plan li{display:flex;gap:9px;font-size:13.5px;line-height:1.4;align-items:flex-start}
  .plan li svg{width:16px;height:16px;color:var(--green);flex-shrink:0;margin-top:2px}
  .plan .btn{margin-top:auto}

  .terms{text-align:center;color:var(--muted);font-size:12.5px;margin-top:16px}
  /* contact */
  .contactcard{margin-top:28px;border:1px solid var(--border);border-radius:20px;padding:30px;text-align:center;background:linear-gradient(180deg,rgba(7,23,53,.7),rgba(11,27,58,.4))}
  .contactrow{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-top:18px}
  .cinfo{display:flex;align-items:center;gap:9px;font-size:15px}
  .cinfo svg{width:18px;height:18px;color:var(--cyan)}
  .lfoot{text-align:center;color:var(--muted);font-size:12.5px;margin-top:48px;line-height:1.7}
  .lfoot .discl{font-size:11px;max-width:640px;margin:10px auto 0;opacity:.8}
  @media(max-width:900px){.dashprev .row-stats{grid-template-columns:repeat(2,1fr)}.steps{grid-template-columns:1fr 1fr}.pricegrid{grid-template-columns:1fr}}
  @media(max-width:760px){.htitle{font-size:32px}.hsub{font-size:15px}.hero{padding:34px 6px 24px}.lnav .links{display:none}.stitle{font-size:24px}.steps{grid-template-columns:1fr}}

  /* ===== Liquid glass + animated background (v2) ===== */
  #bgfx{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none;contain:strict}
  #bgfx .blob{position:absolute;border-radius:50%;filter:blur(56px);opacity:.42;will-change:transform;transform:translateZ(0);backface-visibility:hidden}
  #bgfx .b1{width:46vw;height:46vw;left:-6vw;top:-12vw;background:radial-gradient(circle at 30% 30%,#17573F,transparent 68%);animation:drift1 34s ease-in-out infinite}
  #bgfx .b2{width:40vw;height:40vw;right:-8vw;top:8vh;background:radial-gradient(circle at 60% 40%,#B0824E,transparent 68%);animation:drift2 40s ease-in-out infinite}
  #bgfx .b3{width:38vw;height:38vw;left:20vw;bottom:-14vw;background:radial-gradient(circle at 50% 50%,#2E8A66,transparent 68%);opacity:.32;animation:drift3 46s ease-in-out infinite}
  #bgfx .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(28,107,78,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(28,107,78,.05) 1px,transparent 1px);background-size:48px 48px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 78%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 78%)}
  @keyframes drift1{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(5vw,3vh,0)}}
  @keyframes drift2{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(-4vw,5vh,0)}}
  @keyframes drift3{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(3vw,-4vh,0)}}
  @media(prefers-reduced-motion:reduce){#bgfx .blob{animation:none}}

  .glass{position:relative;border:1px solid var(--glassborder);border-radius:20px;
    background:linear-gradient(160deg,rgba(255,255,255,.065),rgba(255,255,255,.02));
    -webkit-backdrop-filter:blur(10px) saturate(1.4);backdrop-filter:blur(10px) saturate(1.4);
    box-shadow:0 18px 50px -18px rgba(0,0,0,.55),inset 0 1px 0 var(--glasshi)}
  .landing .card,.dashprev,.step,.plan,.contactcard{position:relative;border:1px solid var(--glassborder);
    background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    -webkit-backdrop-filter:blur(9px) saturate(1.3);backdrop-filter:blur(9px) saturate(1.3);
    box-shadow:0 16px 44px -20px rgba(0,0,0,.5),inset 0 1px 0 var(--glasshi)}
  .landing .card{transition:transform .2s ease,box-shadow .2s ease}
  @media(hover:hover){.landing .card:hover{transform:translateY(-4px);box-shadow:0 26px 60px -22px rgba(10,135,92,.4),inset 0 1px 0 var(--glasshi)}}
  .landing p svg,.hsub svg{width:15px;height:15px;vertical-align:middle}
  .btn-lg svg,.btn svg{width:16px;height:16px}
  .badge svg{width:14px;height:14px;flex-shrink:0}
  .landing svg{max-width:100%}

  /* logo mark */
  .brand .logo{background:linear-gradient(140deg,#0a1a3a,#0c2350);border:1px solid rgba(120,180,255,.3);box-shadow:0 0 16px rgba(28,107,78,.35),inset 0 1px 0 rgba(255,255,255,.14)}
  .brand .logo svg{width:22px;height:22px}

  /* hero pill CTAs */
  .hero .btn-lg{border-radius:14px}

  /* browser-chrome dashboard mockup */
  .mock{margin-top:26px;border-radius:20px;overflow:hidden}
  .mockbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--glassborder);background:rgba(255,255,255,.03)}
  .mockbar .dots{display:flex;gap:6px}
  .mockbar .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .mockbar .url{flex:1;text-align:center;font-size:12px;color:var(--muted);background:rgba(0,0,0,.28);border:1px solid var(--glassborder);border-radius:8px;padding:5px 12px;max-width:340px;margin:0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .livechip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--green);background:rgba(92,196,151,.14);border:1px solid rgba(92,196,151,.35);padding:4px 10px;border-radius:999px}
  .livechip i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:vpulse2 1.6s infinite}
  @keyframes vpulse2{0%{box-shadow:0 0 0 0 rgba(92,196,151,.6)}70%{box-shadow:0 0 0 7px rgba(92,196,151,0)}100%{box-shadow:0 0 0 0 rgba(92,196,151,0)}}
  .mockbody{padding:18px}
  .mockstats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

  html[dir="rtl"] .mstat .delta{right:auto;left:12px}
  .mstat .l{font-size:12px;color:var(--muted)}
  .mstat .v{font-size:26px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums}
  .mocktable{margin-top:16px;border:1px solid var(--glassborder);border-radius:14px;overflow:hidden}
  .mth{display:flex;align-items:center;gap:12px;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:rgba(255,255,255,.03);border-bottom:1px solid var(--glassborder)}
  .mtr{display:flex;align-items:center;gap:12px;padding:12px 14px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.05)}
  .mtr:last-child{border-bottom:none}
  .mtr .c1{flex:1.4;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtr .c2{flex:1.6;color:var(--muted);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtr .c3{width:74px}.mtr .c4{width:92px;text-align:right}
  .mth .c1{flex:1.4}.mth .c2{flex:1.6}.mth .c3{width:74px}.mth .c4{width:92px;text-align:right}
  .utag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .u-hot{color:#ff9aa6;background:rgba(255,122,138,.15);border:1px solid rgba(255,122,138,.35)}
  .u-warm{color:var(--amber);background:rgba(251,191,90,.14);border:1px solid rgba(251,191,90,.32)}
  @media(max-width:760px){.mockstats{grid-template-columns:repeat(2,1fr)}.mtr .c2{display:none}.mocktable{font-size:12px}}

  /* numbered steps 01–05 */
  .step{position:relative;overflow:hidden}
  .step .n{width:auto;height:auto;background:none;box-shadow:none;font-size:30px;font-weight:800;
    background-image:linear-gradient(135deg,var(--primary),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;font-variant-numeric:tabular-nums}

  /* contact form */
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;margin-top:26px;text-align:left}
  html[dir="rtl"] .form2{text-align:right}

    border:1px solid var(--glassborder);background:var(--card2);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}

  .contactcard{text-align:left;padding:30px}
  html[dir="rtl"] .contactcard{text-align:right}

  /* richer footer */
  .lfoot2{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:26px;margin-top:60px;padding-top:28px;border-top:1px solid var(--glassborder);text-align:left}

  .lfoot2 a,.lfoot2 .fitem{display:block;color:var(--muted);font-size:13.5px;margin-bottom:8px;cursor:pointer;transition:.15s}

  .lfootbase{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;padding-top:20px;border-top:1px solid var(--glassborder);line-height:1.7}

  /* ===== Responsive + performance (v3) ===== */
  .htitle{font-size:clamp(28px,5.2vw,46px)}
  .stitle{font-size:clamp(22px,3.4vw,30px)}
  .hsub{font-size:clamp(15px,1.7vw,17px)}

  @media(max-width:1024px){
    .landing{padding:16px 18px 56px}
    .lnav{gap:10px;padding:9px 8px 9px 16px}

    .grid.cols-4{grid-template-columns:repeat(2,1fr)}

  /* phones: drop GPU-heavy blur + background motion for smoothness */

  }

  /* ===================== CRM Integrations ===================== */

  /* ============================================================
     LUXURY THEME (light + dark) — emerald / brown / beige / gold
     ============================================================ */
  body{background-image:
    radial-gradient(1100px 620px at 84% -12%, rgba(28,107,78,.10), transparent 60%),
    radial-gradient(920px 520px at -8% 12%, rgba(18,58,44,.05), transparent 58%);}
  :root[data-theme="dark"] body{background-image:
    radial-gradient(1100px 620px at 84% -12%, rgba(34,227,154,.14), transparent 60%),
    radial-gradient(920px 520px at -8% 12%, rgba(34,227,154,.07), transparent 58%);}
  /* smooth theme switch + premium micro-motion */
  body,.card,.sidebar,.topbar,.btn,.badge,.navlink,.leaditem,.qa,.plan,.step,.provcard{transition:background-color .35s ease,border-color .35s ease,color .25s ease,box-shadow .3s ease,transform .18s ease}
  /* refined serif headings for a branded, editorial feel */
  .htitle,.stitle,.pagehead h1,.authcard h2,.obh,.brand,.wiztitle{font-family:var(--serif);letter-spacing:.1px}
  .pagehead h1,.card h3,.stitle{color:var(--heading)}
  /* surfaces */
  .sidebar{background:var(--sidebar)}
  .topbar{background:var(--topbar)}
  .card,.glass,.landing .card,.dashprev,.step,.plan,.contactcard,.authcard,.mock,.provcard{
    background:var(--card);border:1px solid var(--border);
    box-shadow:0 1px 2px var(--shadow2),0 16px 34px -20px var(--shadow);-webkit-backdrop-filter:none;backdrop-filter:none}
  :root[data-theme="dark"] .card,:root[data-theme="dark"] .glass,:root[data-theme="dark"] .landing .card,:root[data-theme="dark"] .dashprev,:root[data-theme="dark"] .step,:root[data-theme="dark"] .plan,:root[data-theme="dark"] .contactcard,:root[data-theme="dark"] .mock{
    background:linear-gradient(160deg,rgba(255,255,255,.03),rgba(255,255,255,.012)),var(--card)}
  .landing .card:hover{box-shadow:0 24px 46px -22px var(--shadow),0 0 0 1px var(--border-hi)}
  .search,.iconbtn,.langsw,.themebtn{background:var(--card2)}
  .mockbar,.mstat,.miniStat,.mocktable,.testcard,.obsvc,.obrev,.checkRow,.chk,.syncrec{background:var(--card2)}
  thead th{background:var(--card2)}
  tbody tr:hover{background:rgba(28,107,78,.06)}
  .leaditem{background:var(--card)}
  .leaditem:hover{border-color:var(--primary);background:rgba(28,107,78,.05)}
  /* nav */
  .navlink:hover{background:rgba(28,107,78,.10);color:var(--text)}
  .navlink.active{background:linear-gradient(90deg,rgba(28,107,78,.16),rgba(28,107,78,.03));color:var(--heading);border-color:var(--border-hi)}
  .navlink.active svg{color:var(--primary)}
  .mobnav{background:var(--sidebar)}
  .mobnav button.active{color:var(--primary)}
  .langsw button.on{color:#fff}
  /* buttons */
  .btn{background:var(--card2);color:var(--text);border:1px solid var(--border)}
  .btn:hover{border-color:var(--primary);transform:translateY(-1px)}
  .btn-ghost{background:none}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff;border:none;box-shadow:0 8px 22px -8px rgba(28,107,78,.5)}
  .btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .btn-danger{border-color:rgba(192,85,59,.5);color:var(--red);background:var(--card2)}
  .link{color:var(--primary)}
  /* logo + brand */
  .brand .logo{background:linear-gradient(140deg,var(--primary),var(--glow));border:1px solid rgba(255,255,255,.25);box-shadow:0 6px 16px -6px rgba(28,107,78,.6)}
  /* badges — legible on both grounds */
  .b-New{background:rgba(28,107,78,.12);color:#155C41;border-color:rgba(28,107,78,.32)}
  .b-Contacted{background:rgba(90,104,112,.13);color:#516069;border-color:rgba(90,104,112,.28)}
  .b-Qualified{background:rgba(168,121,31,.15);color:#8A6416;border-color:rgba(168,121,31,.32)}
  .b-Booked{background:rgba(46,138,102,.12);color:#2A6B5A;border-color:rgba(46,138,102,.3)}
  .b-Won{background:rgba(28,107,78,.16);color:#155C41;border-color:rgba(28,107,78,.35)}
  .b-Lost{background:rgba(192,85,59,.12);color:#A5442C;border-color:rgba(192,85,59,.3)}
  .b-Spam{background:rgba(120,110,100,.10);color:#6B6258;border-color:rgba(120,110,100,.22)}
  :root[data-theme="dark"] .b-New{background:rgba(46,138,102,.16);color:#5FE3B0;border-color:rgba(46,138,102,.4)}
  :root[data-theme="dark"] .b-Contacted{background:rgba(150,166,176,.13);color:#B6C4CC;border-color:rgba(150,166,176,.24)}
  :root[data-theme="dark"] .b-Qualified{background:rgba(217,180,90,.16);color:#E3C173;border-color:rgba(217,180,90,.32)}
  :root[data-theme="dark"] .b-Booked{background:rgba(60,224,166,.14);color:#8FEBC8;border-color:rgba(60,224,166,.3)}
  :root[data-theme="dark"] .b-Won{background:rgba(60,224,166,.2);color:#72E4B6;border-color:rgba(60,224,166,.36)}
  :root[data-theme="dark"] .b-Lost{background:rgba(224,122,95,.16);color:#F2A48C;border-color:rgba(224,122,95,.32)}
  :root[data-theme="dark"] .b-Spam{background:rgba(200,185,160,.10);color:#A99B85;border-color:rgba(200,185,160,.18)}
  /* aurora → warm luxury glows */
  #bgfx .b1{background:radial-gradient(circle at 30% 30%,var(--primary),transparent 68%);opacity:.10}
  #bgfx .b2{background:radial-gradient(circle at 60% 40%,var(--accent),transparent 68%);opacity:.10}
  #bgfx .b3{background:radial-gradient(circle at 50% 50%,var(--cyan),transparent 68%);opacity:.08}
  :root[data-theme="dark"] #bgfx .b1{opacity:.28}
  :root[data-theme="dark"] #bgfx .b2{opacity:.20}
  :root[data-theme="dark"] #bgfx .b3{opacity:.18}
  #bgfx .grid{opacity:.45}
  :root[data-theme="dark"] #bgfx .grid{opacity:1}
  /* landing nav pill */
  .lnav{background:var(--topbar);border:1px solid var(--border);box-shadow:0 14px 34px -18px var(--shadow),inset 0 1px 0 var(--glasshi);
    -webkit-backdrop-filter:blur(16px) saturate(1.2);backdrop-filter:blur(16px) saturate(1.2)}
  .lnav::after{background:none}
  .lnav .links a{color:var(--muted)}
  .lnav .links a:hover{color:var(--heading)}
  /* live chip / mock */
  .livechip{color:var(--green);background:rgba(28,107,78,.12);border-color:rgba(28,107,78,.32)}
  .livechip i{background:var(--green)}
  /* voice */
  .vmsg.bot{background:var(--card2);border-color:var(--border);color:var(--text)}
  .vmsg.user{background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff}
  .vmic{background:linear-gradient(135deg,var(--primary),var(--glow));box-shadow:0 10px 30px -10px rgba(28,107,78,.55)}
  /* accent tints that were blue */
  .step .n{background-image:linear-gradient(135deg,var(--primary),var(--cyan))}
  .setupbanner{background:linear-gradient(135deg,rgba(28,107,78,.14),rgba(28,107,78,.03));border-color:var(--border-hi)}
  .qa .qai,.setupbanner .sbi,.archnote .ai,.ficon,.empty .ic{background:rgba(28,107,78,.12);color:var(--primary)}
  .tagpill{background:rgba(28,107,78,.10);color:var(--primary);border-color:var(--border)}
  .flowchip svg{color:var(--primary)}
  .cs-connected{color:var(--green);background:rgba(28,107,78,.12);border-color:rgba(28,107,78,.32)}
  .chk.on{border-color:var(--primary);background:rgba(28,107,78,.10)}
  .chk.on .box{background:linear-gradient(135deg,var(--primary),var(--glow));border-color:transparent}
  .wizsteps .wd.on{background:linear-gradient(90deg,var(--primary),var(--cyan))}
  .obopt.on{border-color:var(--border-hi);background:rgba(28,107,78,.10);box-shadow:0 0 0 3px rgba(28,107,78,.14)}
  .obprog>span,.bar>span{background:linear-gradient(90deg,var(--primary),var(--cyan))}
  .plan.pop{border-color:var(--border-hi);box-shadow:0 14px 40px -18px rgba(28,107,78,.3)}
  .sy-synced{color:var(--green);background:rgba(28,107,78,.1);border-color:rgba(28,107,78,.28)}
  /* content reveal + theme toggle */
  .content{animation:fadeUp .5s ease both}
  .themebtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--muted)}
  .themebtn:hover{color:var(--primary);border-color:var(--primary)}
  .themebtn svg{width:18px;height:18px}
  .lnav .themebtn{width:34px;height:34px}

  /* keep inputs clear of the on-screen keyboard / sticky topbar on phones */
  input,textarea,select{scroll-margin-top:80px;scroll-margin-bottom:120px}

  /* ===================== Refinements v2 — search, motion, polish ===================== */
  /* ---- Search bar (premium) ---- */
  .search{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0 8px 0 14px;height:42px;gap:10px;
    box-shadow:inset 0 1px 2px var(--shadow2);transition:border-color .18s ease,box-shadow .18s ease}
  .search svg{color:var(--primary);width:18px;height:18px}
  .search:hover{border-color:var(--border-hi)}
  .search.searchbtn:hover,.search:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(28,107,78,.14)}
  .search span{color:var(--muted)}
  .search .kbd{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--card2);
    border:1px solid var(--border);border-radius:7px;padding:3px 8px}
  html[dir="rtl"] .search .kbd{margin-left:0;margin-right:auto}
  .searchwrap{position:relative}
  .searchwrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--primary);pointer-events:none;z-index:1}
  html[dir="rtl"] .searchwrap svg{left:auto;right:15px}
  .searchwrap input{padding-left:44px!important}
  html[dir="rtl"] .searchwrap input{padding-left:13px!important;padding-right:44px!important}

  /* ---- More UI motion (tasteful) ---- */
  @keyframes lux-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes lux-pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
  @keyframes donut-in{from{opacity:0;transform:scale(.82) rotate(-14deg)}to{opacity:1;transform:none}}
  @keyframes fstage-in{from{opacity:0;transform:translateX(-14px) scaleX(.96)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:no-preference){
    .content .grid>.card,.content>.card,.leadlist .leaditem,.provgrid .provcard,.pricegrid .plan,.steps .step{animation:lux-in .5s cubic-bezier(.2,.7,.2,1) both}
    .grid.cols-4>.card:nth-child(2),.leadlist .leaditem:nth-child(2){animation-delay:.05s}

  /* ============================================================
     CHARTS v2 — status BARS + conversion RINGS, on a live background
     ============================================================ */
  /* --- live ambient background inside chart cards (subtle: depth, never noise) --- */
  .chartcard{position:relative;overflow:hidden;isolation:isolate}
  .chartcard>*{position:relative;z-index:1}
  .chartcard::before{content:"";position:absolute;z-index:0;inset:-40%;pointer-events:none;
    background:
      radial-gradient(38% 38% at 22% 28%,rgba(35,134,98,.13),transparent 62%),
      radial-gradient(34% 34% at 78% 68%,rgba(198,161,91,.10),transparent 62%),
      radial-gradient(30% 30% at 60% 20%,rgba(87,184,146,.10),transparent 62%);
    filter:blur(26px)}
  :root[data-theme="dark"] .chartcard::before{
    background:
      radial-gradient(38% 38% at 22% 28%,rgba(34,227,154,.16),transparent 62%),
      radial-gradient(34% 34% at 78% 68%,rgba(22,201,138,.12),transparent 62%),
      radial-gradient(30% 30% at 60% 20%,rgba(127,240,203,.09),transparent 62%)}
  .chartcard::after{content:"";position:absolute;z-index:0;inset:0;pointer-events:none;opacity:.5;
    background-image:linear-gradient(var(--chart-grid) 1px,transparent 1px),linear-gradient(90deg,var(--chart-grid) 1px,transparent 1px);
    background-size:34px 34px;
    -webkit-mask-image:radial-gradient(circle at 50% 40%,#000,transparent 76%);mask-image:radial-gradient(circle at 50% 40%,#000,transparent 76%)}
  @media(prefers-reduced-motion:no-preference){

  }
  @keyframes auroraDrift{0%,100%{transform:translate3d(0,0,0) scale(1)}33%{transform:translate3d(3%,-2%,0) scale(1.06)}66%{transform:translate3d(-2%,3%,0) scale(1.03)}}
  @keyframes gridBreathe{0%,100%{opacity:.32}50%{opacity:.6}}

  /* --- Leads by status: COLUMN bar graph --- */
  .cbWrap{margin-top:4px}
  .cbTotal{font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .cbTotal b{font-family:var(--serif);font-size:22px;color:var(--heading);margin-inline-end:4px}

  .cbCols{position:relative;display:flex;align-items:flex-end;gap:2%;height:180px;padding-inline-start:22px}
  .cbCol{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px}
  .cbSlot{width:100%;max-width:38px;flex:1;display:flex;align-items:flex-end;justify-content:center}
  .cbBar{width:100%;border-radius:7px 7px 3px 3px;min-height:2px;transform-origin:bottom;box-shadow:0 6px 14px -8px var(--shadow)}
  @media(prefers-reduced-motion:no-preference){.cbBar{animation:colGrow .8s cubic-bezier(.2,.8,.2,1) both}}
  @keyframes colGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .cbVal{font-size:14px;font-weight:800;color:var(--heading);font-variant-numeric:tabular-nums;line-height:1}
  .cbCol.zero .cbVal{color:var(--muted)}
  .cbName{font-size:11px;color:var(--muted);text-align:center;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cbCol{cursor:default;transition:transform .16s ease}
  .cbCol:hover{transform:translateY(-2px)}
  .cbCol:hover .cbBar{filter:brightness(1.08)}
  @media(max-width:520px){.cbName{font-size:9.5px}.cbCols{gap:1.5%}}

  /* --- Conversion funnel: DONUT / pie --- */
  .pieWrap{display:flex;gap:28px;align-items:center;flex-wrap:wrap;margin-top:6px}
  .pieChart{position:relative;width:200px;height:200px;flex-shrink:0}
  .pieChart svg{width:100%;height:100%;transform:rotate(-90deg)}
  .pieTrack{fill:none;stroke:var(--chart-track)}
  .pieSeg{fill:none;stroke-linecap:butt;transition:stroke-width .2s ease,filter .2s ease;cursor:pointer}
  .pieSeg:hover{stroke-width:36;filter:brightness(1.1)}
  @media(prefers-reduced-motion:no-preference){.pieSeg{animation:pieIn .9s cubic-bezier(.3,.7,.2,1) both}}
  @keyframes pieIn{from{stroke-dasharray:0 999}to{stroke-dasharray:var(--len)}}
  .pieCentre{position:absolute;inset:0;display:grid;place-content:center;text-align:center;pointer-events:none}
  .pieBig{font-size:36px;font-weight:800;line-height:1;color:var(--heading)}
  .pieLbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:5px}
  .pieLegend{flex:1;min-width:240px}
  .pieHead,.pieRow{display:grid;grid-template-columns:12px 1fr 40px 44px 52px;align-items:center;gap:9px}
  .pieHead{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:0 4px 7px;border-bottom:1px solid var(--border)}
  .pieHead span:nth-child(n+3){text-align:end}
  .pieRow{padding:8px 4px;border-bottom:1px solid var(--border);font-size:13.5px;transition:background .18s ease;border-radius:7px}
  .pieRow:last-child{border-bottom:none}
  .pieRow:hover{background:var(--card2)}
  .pieDot{width:10px;height:10px;border-radius:3px}
  .pieName{font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pieHere{font-weight:800;text-align:end;font-variant-numeric:tabular-nums;color:var(--heading)}
  .piePct{text-align:end;font-variant-numeric:tabular-nums;color:var(--muted)}
  .pieDrop{text-align:end;font-variant-numeric:tabular-nums;color:var(--red);font-weight:600;font-size:12.5px}
  @media(max-width:560px){.pieWrap{gap:16px;justify-content:center}.pieHead,.pieRow{grid-template-columns:12px 1fr 34px 40px 46px}}

function setLang(l){try{if(VOICE&&(VOICE.active||VOICE.timer))voiceEnd()}catch(e){}LANG=l;DB.set('ag_lang',l);applyDir();render()}
function applyDir(){try{document.documentElement.lang=LANG;document.documentElement.dir=(LANG==='ar'?'rtl':'ltr')}catch(e){}}
/* ---- Theme (light warm-luxury / dark luxury) ---- */
var THEME=DB.get('ag_theme','light');if(THEME!=='dark')THEME='light';
function applyTheme(){try{document.documentElement.setAttribute('data-theme',THEME);var m=document.querySelector('meta[name=theme-color]');if(m)m.setAttribute('content',THEME==='dark'?'#17110B':'#F1EADD')}catch(e){}}
function setTheme(v){THEME=(v==='dark'?'dark':'light');DB.set('ag_theme',THEME);applyTheme()}
function toggleTheme(){setTheme(THEME==='dark'?'light':'dark');render()}
function themeSwitch(){return '<button class="themebtn" onclick="toggleTheme()" title="Toggle light / dark" aria-label="Toggle theme">'+icon(THEME==='dark'?'sun':'moon')+'</button>'}
/* premium touch: count up numeric stat values on render */
function revealInit(){
  try{
    var root=document.querySelector('.landing');if(!root)return;

/* ============================ Security (hashing, lockout, session expiry) ============================ */
/*SHA*/
function sha256hex(str){
  var ascii;try{ascii=unescape(encodeURIComponent(String(str)))}catch(e){ascii=String(str)}
  function rr(v,a){return (v>>>a)|(v<<(32-a))}
  var maxWord=Math.pow(2,32),result='',i,j;
  var words=[],asciiBitLength=ascii.length*8;
  var hash=sha256hex.h=sha256hex.h||[],k=sha256hex.k=sha256hex.k||[];
  var primeCounter=k.length,isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate)isComposite[i]=candidate;
      hash[primeCounter]=(Math.pow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(Math.pow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    j=ascii.charCodeAt(i);if(j>>8)j=63;
    words[i>>2]|=j<<((3-i)%4*8);
  }
  words[words.length]=(asciiBitLength/maxWord)|0;
  words[words.length]=asciiBitLength;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16),oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++){for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16)}}
  return result;
}
/*ENDSHA*/
var HASH_ITER=2048;
function hashPass(pass,salt){var h=salt+'|'+pass;for(var i=0;i<HASH_ITER;i++){h=sha256hex(h)}return h}
function makeSalt(){
  try{var a=new Uint8Array(16);(window.crypto||window.msCrypto).getRandomValues(a);
    var s='';for(var i=0;i<a.length;i++){s+=('0'+a[i].toString(16)).slice(-2)}return s}
  catch(e){return (Date.now().toString(36)+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2)).slice(0,32)}
}
function passOK(p){return typeof p==='string'&&p.length>=8&&/[A-Za-z]/.test(p)&&/[0-9]/.test(p)}
var LOCK_MAX=5,LOCK_MS=5*60000,SESSION_MS=14*86400000;
function lockCheck(email){var lk=DB.get('ag_lock',{});if(!isObj(lk))lk={};var r=lk[email];if(r&&r.until&&r.until>Date.now())throw new Error('Too many failed attempts. Please try again in a few minutes.')}
function lockFail(email){var lk=DB.get('ag_lock',{});if(!isObj(lk))lk={};var r=Object.prototype.hasOwnProperty.call(lk,email)?lk[email]:{n:0};r.n=(r.n||0)+1;if(r.n>=LOCK_MAX){r.locks=(r.locks||0)+1;r.until=Date.now()+LOCK_MS*Math.min(8,Math.pow(2,r.locks-1));r.n=0}lk[email]=r;DB.set('ag_lock',lk)}
function lockClear(email){var lk=DB.get('ag_lock',{});if(!isObj(lk))lk={};if(lk[email]){delete lk[email];DB.set('ag_lock',lk)}}

/* ============================ Auth ============================ */
var AUTH={
  users:function(){var u=DB.get('ag_users',{});return isObj(u)?u:{}},
  session:function(){var s=DB.get('ag_session',null);if(s&&(!isObj(s)||typeof s.email!=='string')){DB.del('ag_session');return null}if(s&&s.at&&(Date.now()-s.at)>SESSION_MS){DB.del('ag_session');return null}return s},
  current:function(){var s=AUTH.session();return s?AUTH.users()[s.email]:null},
  signup:function(name,biz,email,pass){
    email=(email||'').toLowerCase().trim();
    if(!name||!name.trim()||!biz||!biz.trim()||!email) throw new Error('Please fill in every field.');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)||/^(__proto__|constructor|prototype)$/.test(email)) throw new Error('Please enter a valid email address.');
    if(!passOK(pass)) throw new Error('Password must be at least 8 characters and include a letter and a number.');
    var users=AUTH.users();
    if(users[email]) throw new Error('An account with this email already exists.');
    var salt=makeSalt();
    users[email]={name:name.trim().slice(0,60),biz:biz.trim().slice(0,80),email:email,salt:salt,pass:hashPass(pass,salt),created:Date.now()};
    DB.set('ag_users',users);
    AUTH.login(email,pass);
  },
  login:function(email,pass){
    email=(email||'').toLowerCase().trim();
    if(!email||/^(__proto__|constructor|prototype)$/.test(email)) throw new Error('Incorrect email or password.');
    lockCheck(email);
    var users=AUTH.users(),u=Object.prototype.hasOwnProperty.call(users,email)?users[email]:null,ok=false;
    if(u){
      if(u.salt){ok=(u.pass===hashPass(pass,u.salt))}
      else{
        var legacy=null;try{legacy=btoa(pass)}catch(e){}
        ok=(legacy!=null&&u.pass===legacy);
        if(ok){u.salt=makeSalt();u.pass=hashPass(pass,u.salt);users[email]=u;DB.set('ag_users',users)}
      }
    }
    if(!ok){lockFail(email);throw new Error('Incorrect email or password.')}
    lockClear(email);
    DB.set('ag_session',{email:email,at:Date.now()});
    seedIfNeeded(email);
  },
  /* Adopt an identity ALREADY verified by Supabase Auth. Deliberately stores NO password
     hash locally — the credential lives only on Supabase's server, so there is nothing on
     this device for an attacker to steal or crack. */
  adoptExternal:function(email,name,biz){
    email=(email||'').toLowerCase().trim();
    if(!email||/^(__proto__|constructor|prototype)$/.test(email))throw new Error('Invalid email.');
    var u=AUTH.users();
    var prev=Object.prototype.hasOwnProperty.call(u,email)?u[email]:null;
    u[email]={name:String(name||(prev&&prev.name)||email.split('@')[0]).trim().slice(0,60),
              biz:String(biz||(prev&&prev.biz)||'My business').trim().slice(0,80),
              email:email,auth:'supabase',created:(prev&&prev.created)||Date.now()};
    DB.set('ag_users',u);
    DB.set('ag_session',{email:email,at:Date.now(),auth:'supabase'});
    return u[email];
  },
  /* true when the current session was verified by Supabase (not the local demo store) */
  isSecure:function(){var s=AUTH.session();return !!(s&&s.auth==='supabase')},
  logout:function(){DB.del('ag_session');try{BK.signOut()}catch(e){}}
};

/* Friendly text for the errors Supabase Auth actually returns. */
function bkAuthError(m){
  m=String(m||'');
  if(/Invalid login credentials/i.test(m))return 'Incorrect email or password.';
  if(/User already registered|already been registered/i.test(m))return 'That email already has an account — sign in instead.';
  if(/Password should be at least/i.test(m))return 'Password must be at least 8 characters.';
  if(/rate limit|too many/i.test(m))return 'Too many attempts. Please wait a minute and try again.';
  if(/Email not confirmed/i.test(m))return 'Please confirm your email first — check your inbox.';
  if(/Failed to fetch|NetworkError|no_project/i.test(m))return 'Could not reach the secure server. Check your connection.';
  return m;
}
function submitAuth(e,mode){
  e.preventDefault();
  var f=e.target, el=f.elements, errBox=f.querySelector('#authErr'), err=errBox.querySelector('.err');
  errBox.style.display='none';
  var showErr=function(m){errBox.style.display='block';err.textContent=m};
  var email=el['email']?el['email'].value:'', pass=el['pass']?el['pass'].value:'';
  var name=el['name']?el['name'].value:'', biz=el['biz']?el['biz'].value:'';

  /* REAL auth: when a Supabase project is configured, credentials are verified server-side
     and no password ever lands in this browser's storage. */
  if(BK.hasProject()){
    var btn=f.querySelector('button.btn-primary');
    if(btn){btn.disabled=true;btn.style.opacity='.65'}
    var done=function(){if(btn){btn.disabled=false;btn.style.opacity=''}};
    var p=(mode==='signup')?BK.signUp(email,pass,{full_name:name,business_name:biz}):BK.signIn(email,pass);
    p.then(function(res){
      done();
      if(mode==='signup'&&res&&res.session===false){showErr(t('auth_confirm_email'));return}
      AUTH.adoptExternal(email,name,biz);
      toast(t('auth_secure_ok'));
      if(mode==='signup'){
        setOnboard({status:'in_progress',step:0,answers:{crm_mode:'hybrid',services:[],business_name:biz,main_email:email}});
        location.hash='#/onboarding';
      }else{location.hash='#/dashboard'}
      render();
    })['catch'](function(ex){done();showErr(bkAuthError(ex&&ex.message))});
    return false;
  }

  /* No backend configured → local demo accounts only (clearly not real security). */
  try{
    if(mode==='signup'){AUTH.signup(name,biz,email,pass);toast('Welcome to Alsaiti Growth');
      setOnboard({status:'in_progress',step:0,answers:{crm_mode:'hybrid',services:[],business_name:biz,main_email:email}});location.hash='#/onboarding';return false}
    else{AUTH.login(email,pass);toast('Signed in')}
    location.hash='#/dashboard';
  }catch(ex){showErr(ex.message)}
  return false
}

/* Theme-aware status colours (CSS vars) — distinct hue per status, auto-switch with the theme */
var STCOL={New:'var(--st-new)',Contacted:'var(--st-contacted)',Qualified:'var(--st-qualified)',Booked:'var(--st-booked)',Won:'var(--st-won)',Lost:'var(--st-lost)',Spam:'var(--st-spam)'};
/* Leads by status → horizontal BAR chart. Every bar is directly labelled, so identity is
   never colour-alone. Ordered pipeline uses the validated ordinal ramp; Lost/Spam are
   reserved status tokens. Bars grow in on render (reduced-motion safe). */
function statusBars(counts,total){
  var tot=total||1;
  var max=1;STATUSES.forEach(function(st){if((counts[st]||0)>max)max=counts[st]||0});
  /* round the axis up to a clean top so gridlines land on whole leads */
  var top=max<=4?max:Math.ceil(max/5)*5;
  var ticks=[];for(var g=0;g<=2;g++)ticks.push(Math.round(top-(top/2)*g));
  var grid=ticks.map(function(n){return '<div class="cbGridline"><span>'+n+'</span></div>'}).join('');
  var cols=STATUSES.map(function(st,i){
    var v=counts[st]||0,pct=Math.round(v/tot*100),h=top>0?(v/top*100):0;
    return '<div class="cbCol'+(v===0?' zero':'')+'" title="'+esc(st)+': '+v+' lead'+(v===1?'':'s')+' · '+pct+'% of all leads">'+
      '<span class="cbVal">'+v+'</span>'+
      '<span class="cbSlot"><i class="cbBar" style="height:'+h.toFixed(1)+'%;background:'+STCOL[st]+';animation-delay:'+(i*65)+'ms"></i></span>'+
      '<span class="cbName">'+esc(st)+'</span></div>';
  }).join('');
  return '<div class="cbWrap"><div class="cbTotal"><b>'+total+'</b> '+esc(t('total_leads'))+'</div>'+
    '<div class="cbPlot"><div class="cbGrid">'+grid+'</div><div class="cbCols">'+cols+'</div></div></div>';
}
/* Conversion funnel → a real DONUT (pie) chart.
   Funnel counts are cumulative (the 3 Contacted are also inside the 8 New), so slicing them
   directly would double-count. We derive MUTUALLY EXCLUSIVE buckets — where each lead
   actually stands now (stalled at a stage, or Won) — which genuinely sum to the whole, so a
   pie is honest. Thick ring, big clear hole for the hero conversion figure (no overlap). */
function funnelRings(funnel){
  var cols=['var(--fn1)','var(--fn2)','var(--fn3)','var(--fn4)','var(--fn5)'];
  var entered=(funnel[0]&&funnel[0][2])||0, won=(funnel[funnel.length-1]&&funnel[funnel.length-1][2])||0;
  var convRate=entered>0?Math.round(won/entered*100):0;
  /* exclusive buckets: reached stage i but not i+1 (last stage = converted) */
  var segs=[];
  funnel.forEach(function(f,i){
    var next=funnel[i+1], v=next?Math.max(0,f[2]-next[2]):f[2];
    var drop=i>0&&funnel[i-1][2]>0?Math.round((funnel[i-1][2]-f[2])/funnel[i-1][2]*100):0;
    segs.push({name:f[0],here:v,reached:f[2],pct:f[1],drop:drop,col:cols[Math.min(i,cols.length-1)],last:!next});
  });
  var sum=segs.reduce(function(a,s){return a+s.here},0)||1;
  var size=200,cx=100,cy=100,r=70,w=30,C=2*Math.PI*r,gap=sum>1?3:0,acc=0,arcs='',legend='';
  segs.forEach(function(s,i){
    if(s.here>0){
      var len=Math.max(0,s.here/sum*C-gap);
      arcs+='<circle class="pieSeg" cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke-width="'+w+'" stroke="'+s.col+'"'+
        ' stroke-dasharray="'+len.toFixed(1)+' '+(C-len).toFixed(1)+'" stroke-dashoffset="'+(-acc).toFixed(1)+'"'+
        ' style="--len:'+len.toFixed(1)+' '+(C-len).toFixed(1)+';animation-delay:'+(i*110)+'ms">'+
        '<title>'+esc(s.name)+': '+s.here+' lead'+(s.here===1?'':'s')+' here</title></circle>';
      acc+=s.here/sum*C;
    }
    legend+='<div class="pieRow"><i class="pieDot" style="background:'+s.col+'"></i>'+
      '<span class="pieName">'+esc(s.name)+(s.last?' ✓':'')+'</span>'+
      '<span class="pieHere">'+s.here+'</span><span class="piePct">'+Math.round(s.here/sum*100)+'%</span>'+
      '<span class="pieDrop">'+(s.drop>0?'−'+s.drop+'%':'—')+'</span></div>';
  });
  return '<div class="pieWrap"><div class="pieChart"><svg viewBox="0 0 '+size+' '+size+'" role="img" aria-label="Conversion breakdown">'+
      '<circle class="pieTrack" cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke-width="'+w+'"/>'+arcs+'</svg>'+
    '<div class="pieCentre"><div class="pieBig">'+convRate+'%</div><div class="pieLbl">'+esc(t('conv_rate_lbl'))+'</div></div></div>'+
    '<div class="pieLegend"><div class="pieHead"><span></span><span>'+esc(t('th_status'))+'</span><span>'+esc(t('pie_here'))+'</span><span>%</span><span>'+esc(t('fr_drop'))+'</span></div>'+legend+'</div></div>';
}

/* Return the best voice FOR THE TARGET LANGUAGE and gender, or null.
   CRITICAL: never fall back to a voice of a different language — an English voice reading
   Arabic/Spanish silently drops every non-Latin character (the "just says Alsaiti Growth" bug).
   If no matching-language voice exists we return null and the utterance keeps only its .lang,
   letting the browser's own engine handle it (or, worst case, stay silent) rather than mangle it. */
function vPickVoice(code,gender){
  try{
    if(!window.speechSynthesis)return null;
    var vs=window.speechSynthesis.getVoices()||[];
    if(!vs.length)return null;
    var pre=(code||'en').slice(0,2).toLowerCase();
    gender=(gender==='male')?'male':'female';
    var want=(gender==='male'?VPREF_M:VPREF_F)[pre]||[];
    var wantName=(gender==='male'?VNAME_M:VNAME_F), otherName=(gender==='male'?VNAME_F:VNAME_M);
    /* language-strict: only voices whose lang starts with the target prefix */
    var m=vs.filter(function(v){return (v.lang||'').toLowerCase().indexOf(pre)===0});
    if(!m.length)return null; /* no native voice — do NOT substitute another language */
    var score=function(v){var n=((v.name||'')+' '+(v.lang||'')).toLowerCase();var s=0;
      for(var i=0;i<want.length;i++){if(n.indexOf(want[i])>=0){s+=60-i;break}}
      if(wantName.test(n))s+=20;              /* right gender */
      if(otherName.test(n))s-=30;             /* wrong gender — strongly avoid */
      if(/natural|neural|premium|enhanced|online/.test(n))s+=10; /* the human-sounding ones */
      if(/google/.test(n))s+=5;
      if(v.localService===false)s+=3;         /* cloud voices are usually more natural */
      if(pre==='en'&&/gb|united kingdom|british/.test(n))s+=2;

    return m[0]||null;
  }catch(e){return null}
}
/* Warm, upbeat, human prosody — never flat/robotic, never sad. Higher pitch reads friendlier;
   a natural (not slow) rate reads energetic. Tuned per language + gender. */
function vProsody(lang,gender){
  gender=(gender==='male')?'male':'female';
  var p=(gender==='male')?{rate:0.99,pitch:0.94}:{rate:1.02,pitch:1.12};
  if(lang==='ar'){p=(gender==='male')?{rate:0.93,pitch:0.97}:{rate:0.96,pitch:1.08};}
  else if(lang==='es'){p=(gender==='male')?{rate:1.0,pitch:0.95}:{rate:1.03,pitch:1.12};}
  return p;
}

/* ---- Human (neural) voice via the backend TTS function -------------------------------------
   When the backend is configured AND ultra-realistic voice is on, we fetch genuinely lifelike
   audio (ElevenLabs / OpenAI) and play it. Falls back to the device voice on ANY problem, so
   the receptionist always speaks. A small in-memory cache avoids re-synthesising repeats. */
var HUMAN_VOICE=(function(){var v=DB.get('ag_human_voice',null);return v===null?true:!!v})();
var TTS_CACHE={}, TTS_AUDIO=null, TTS_UNAVAILABLE=false;

function say(text){
  var lang=LANG, gender=VOICE.gender||'female';
  if(!humanVoiceOn()){sayDevice(text);return}
  var spoken=speechClean(sayBrand(text,lang));
  var key=lang+'|'+gender+'|'+spoken;
  var play=function(dataUri){try{ttsStop();var a=new Audio(dataUri);TTS_AUDIO=a;a.play()['catch'](function(){sayDevice(text)})}catch(e){sayDevice(text)}};
  if(TTS_CACHE[key]){play(TTS_CACHE[key]);return}

  var swapped=false;var slow=setTimeout(function(){if(!swapped)sayDevice(text)},1200);
  try{
    BK.fn('tts',{body:{text:spoken,lang:lang,gender:gender}}).then(function(r){
      clearTimeout(slow);
      if(r&&r.ok&&r.audio){var uri='data:'+(r.mime||'audio/mpeg')+';base64,'+r.audio;TTS_CACHE[key]=uri;swapped=true;try{if(window.speechSynthesis)window.speechSynthesis.cancel()}catch(e){}play(uri)}
      else{if(r&&r.error==='no_tts_provider')TTS_UNAVAILABLE=true;if(!swapped)sayDevice(text)}
    })['catch'](function(){clearTimeout(slow);if(!swapped)sayDevice(text)});
  }catch(e){clearTimeout(slow);sayDevice(text)} /* fetch missing / sync throw → always speak */
}

/* ---- HMAC-SHA256 (byte-accurate) so every event carries a real signature, matching spec §6.1 ---- */
function sha256bytes(str){
  var ascii=String(str);
  function rr(v,a){return (v>>>a)|(v<<(32-a))}
  var maxWord=Math.pow(2,32),result='',i,j;
  var words=[],asciiBitLength=ascii.length*8;
  var hash=sha256bytes.h=sha256bytes.h||[],k=sha256bytes.k=sha256bytes.k||[];
  var primeCounter=k.length,isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate)isComposite[i]=candidate;
      hash[primeCounter]=(Math.pow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(Math.pow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    j=ascii.charCodeAt(i);if(j>>8)j=63;
    words[i>>2]|=j<<((3-i)%4*8);
  }
  words[words.length]=(asciiBitLength/maxWord)|0;
  words[words.length]=asciiBitLength;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16),oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++){for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16)}}
  return result;
}
function _hexToBytes(h){var s='';for(var i=0;i<h.length;i+=2)s+=String.fromCharCode(parseInt(h.substr(i,2),16));return s}
function _utf8(s){try{return unescape(encodeURIComponent(String(s)))}catch(e){return String(s)}}
function hmacSha256(key,msg){
  key=_utf8(key);msg=_utf8(msg);
  if(key.length>64)key=_hexToBytes(sha256bytes(key));
  while(key.length<64)key+='\x00';
  var ip='',op='';
  for(var i=0;i<64;i++){var c=key.charCodeAt(i);ip+=String.fromCharCode(c^0x36);op+=String.fromCharCode(c^0x5c)}
  return sha256bytes(op+_hexToBytes(sha256bytes(ip+msg)));
}

/* ---- Emit: create a signed event, route to connected providers, record sync results ---- */
function crmEmit(eventType,lead){
  try{
    if(!lead||!lead.id)return 0;
    if(crmMode()==='internal')return 0;
    var st=crmState(),ts=Math.floor(Date.now()/1000);
    var routed=st.conns.filter(function(c){return c.sync_enabled&&(c.status==='connected'||c.status==='demo')&&(c.triggers||[]).indexOf(eventType)>=0});
    var env=crmEnvelope(eventType,lead,routed[0]);var body=JSON.stringify(env);
    st.events.unshift({event_id:env.event_id,event_type:eventType,entity_id:lead.id,lead_name:lead.name,status:routed.length?'processed':'no_route',attempt_count:routed.length?1:0,at:Date.now(),ts:ts,sig:crmSign(ts,body),body:body});
    if(st.events.length>80)st.events.length=80;
    routed.forEach(function(c){
      var key=c.id+'|'+lead.id,existing=st.syncs[key];
      var ext=(existing&&existing.ext&&existing.ext.contact)?existing.ext:{contact:crmExtId(c.provider,'contact')};
      if((c.actions||[]).indexOf('deal')>=0&&!ext.deal)ext.deal=crmExtId(c.provider,'deal');
      var isUpdate=!!(existing&&existing.status==='synced');
      st.syncs[key]={connection_id:c.id,provider:c.provider,lead_id:lead.id,lead_name:lead.name,status:'synced',ext:ext,last_event:env.event_id,last_synced:Date.now(),error:null,created:existing?existing.created:Date.now(),updated:Date.now(),url:crmRecordUrl(c,ext)};
      if(!isUpdate)c.synced=(c.synced||0)+1;
      c.last_success=Date.now();c.health='healthy';c.last_error=null;
      st.attempts.unshift({id:'att_'+crmRand(8),event_id:env.event_id,conn:c.id,provider:c.provider,lead_id:lead.id,lead_name:lead.name,event_type:eventType,n:1,status:'success',code:isUpdate?200:201,actions:crmActionsList(c,!isUpdate),at:Date.now()});
    });
    if(st.attempts.length>120)st.attempts.length=120;
    crmSave(st);return routed.length;
  }catch(e){return 0}
}

      '<div class="field"><label>'+esc(t('wz_worksheet'))+'</label><select onchange="crmSetDraft(\'sheet\',this.value)">'+(p.sheets||['Leads']).map(function(a){return '<option'+(a===d.sheet?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select></div>';

function crmLeadSyncs(leadId){var st=crmState(),out=[];Object.keys(st.syncs).forEach(function(k){var r=st.syncs[k];if(r.lead_id===leadId){var c=crmFindConn(st,r.connection_id);if(c&&c.status!=='disconnected')out.push(r)}});return out}
function crmLeadBadge(leadId){
  var syncs=crmLeadSyncs(leadId);if(!syncs.length)return '';
  var anyFail=syncs.some(function(r){return r.status==='failed'});
  var anySync=syncs.some(function(r){return r.status==='synced'});
  var cls,lbl,ic;
  if(anyFail){cls='sy-failed';lbl=t('sync_failed');ic='close'}
  else if(anySync){cls='sy-synced';lbl=t('sync_synced');ic='check'}
  else{cls='sy-pending';lbl=t('sync_pending');ic='clock'}
  return '<span class="syb '+cls+'">'+icon(ic)+' '+esc(lbl)+'</span>';

    var idline=ok?((r.ext.contact?('#'+r.ext.contact):'')+(r.ext.deal?(' · deal #'+r.ext.deal):'')):(r.error?r.error.code:'');

      (ok?(r.url?'<a class="btn btn-sm" href="'+esc(r.url)+'" target="_blank" rel="noopener noreferrer">'+icon('external')+'</a>':''):'<button class="btn btn-sm" onclick="crmRetry(\''+r.connection_id+'\',\''+lead.id+'\')">'+icon('refresh')+' '+esc(t('c_retry'))+'</button>')+'</div>';

/* ---- Clickjacking defence ----------------------------------------------------
   frame-ancestors/X-Frame-Options are HTTP headers a static host can't set, so we
   defend in JS: if this page is framed by a DIFFERENT origin, refuse to render and
   break out. Same-origin framing stays allowed. Also re-checked on every render so
   a late-injected frame can't reveal a populated dashboard. */
function frameGuard(){
  try{
    if(window.top===window.self)return false;
    var sameOrigin=false;
    try{sameOrigin=(window.top.location.origin===window.self.location.origin)}catch(e){sameOrigin=false}
    if(sameOrigin)return false;
    document.documentElement.innerHTML='<body style="margin:0;font-family:system-ui,sans-serif;background:#0D1411;color:#F2EBDC;display:grid;place-items:center;height:100vh;text-align:center;padding:24px">'+
      '<div><p style="font-size:15px;margin:0 0 14px">For your security, Alsaiti Growth can’t be displayed inside another site.</p>'+
      '<a href="'+encodeURI(window.self.location.href)+'" target="_top" style="color:#22E39A;font-weight:700">Open it safely →</a></div></body>';
    try{window.top.location=window.self.location}catch(e){}
    return true;
  }catch(e){return false}
}
if(!frameGuard()){
applyTheme();
applyDir();
bkConsumeReturn();
render();
try{bkShowReturnToast()}catch(e){}
}
