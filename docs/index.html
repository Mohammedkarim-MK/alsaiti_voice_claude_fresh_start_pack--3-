<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#020B1F"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'self'; object-src 'none'"/>
<meta name="referrer" content="no-referrer"/>
<meta name="description" content="Alsaiti Growth — AI receptionists &amp; lead systems that turn enquiries into booked clients. Live trilingual demo (EN / ES / AR)."/>
<meta property="og:title" content="Alsaiti Growth — AI receptionist &amp; lead dashboard"/>
<meta property="og:description" content="AI systems that answer calls, capture leads, follow up automatically, and show everything in a live dashboard."/>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%3E%3Crect%20width%3D%2224%22%20height%3D%2224%22%20rx%3D%226%22%20fill%3D%22%25233AA6FF%22%2F%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%3E%3Crect%20x%3D%229%22%20y%3D%223%22%20width%3D%226%22%20height%3D%2211%22%20rx%3D%223%22%2F%3E%3Cpath%20d%3D%22M5%2011a7%207%200%200%200%2014%200M12%2018v3%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E"/>
<title>Alsaiti Growth — AI receptionist & lead dashboard</title>
<style>
  :root{
    --bg:#020B1F; --bg2:#071735; --primary:#3AA6FF; --cyan:#59C7FF; --glow:#1E90FF;
    --purple:#7E6FEF; --text:#F5F9FF; --muted:#93A8C7;
    --glass:rgba(11,27,58,0.65); --glass-hi:rgba(15,34,68,0.9);
    --border:rgba(83,167,255,0.18); --border-hi:rgba(89,199,255,0.4);
    --green:#57E39A; --amber:#FBBF5A; --red:#FF7A8A;
    --glassborder:rgba(255,255,255,0.10); --glasshi:rgba(255,255,255,0.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(1200px 600px at 82% -10%, rgba(30,144,255,.20), transparent 60%),
                     radial-gradient(900px 500px at -10% 20%, rgba(58,166,255,.11), transparent 55%);
  }
  html[dir="rtl"] body{font-family:"Segoe UI","Noto Naskh Arabic",Tahoma,-apple-system,sans-serif}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  .muted{color:var(--muted)}
  .app{display:flex;min-height:100vh}

  /* Sidebar */
  .sidebar{width:246px;flex-shrink:0;background:rgba(7,23,53,.75);border-right:1px solid var(--border);
    padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;font-weight:700;font-size:17px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--glow));
    display:grid;place-items:center;box-shadow:0 0 18px rgba(58,166,255,.55);flex-shrink:0}
  .brand .logo svg{width:18px;height:18px}
  .navsec{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 10px 6px}
  .navlink{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);
    font-size:14px;cursor:pointer;transition:.15s;border:1px solid transparent;width:100%;background:none;text-align:left}
  html[dir="rtl"] .navlink{text-align:right}
  .navlink svg{width:18px;height:18px;flex-shrink:0}
  .navlink:hover{background:rgba(58,166,255,.10);color:var(--text)}
  .navlink.active{background:linear-gradient(90deg,rgba(58,166,255,.22),rgba(58,166,255,.05));
    color:var(--text);border-color:var(--border)}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:13px 20px;background:rgba(2,11,31,.72);border-bottom:1px solid var(--border);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
  .hamb{display:none;background:none;border:1px solid var(--border);color:var(--text);border-radius:9px;
    width:38px;height:38px;font-size:18px;cursor:pointer}
  .search{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:var(--glass);
    border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--muted)}
  .search svg{width:17px;height:17px;flex-shrink:0}
  .search input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:14px}
  .topbar .spacer{flex:1}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--glass);
    display:grid;place-items:center;cursor:pointer;color:var(--muted);position:relative}
  .iconbtn svg{width:18px;height:18px}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--glow));
    display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
  .content{padding:22px;max-width:1160px;width:100%;margin:0 auto}
  .pagehead{margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .pagehead h1{font-size:24px;font-weight:800}
  .pagehead p{color:var(--muted);margin-top:4px;font-size:14px}
  .pagehead .spacer{flex:1}

  /* Language switch */
  .langsw{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--glass)}
  .langsw button{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 11px;cursor:pointer;transition:.15s}
  .langsw button.on{background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff}
  .langsw button:hover:not(.on){color:var(--text)}

  /* Cards / grid */
  .grid{display:grid;gap:16px}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .cols-2{grid-template-columns:repeat(2,1fr)}
  .card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:18px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .stat .label{font-size:13px;color:var(--muted)}
  .stat .value{font-size:30px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .delta{font-size:12px;margin-top:6px}
  .up{color:var(--green)}.down{color:var(--red)}
  .card h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:999px;
    border:1px solid var(--border);white-space:nowrap;font-weight:600}
  .b-New{background:rgba(58,166,255,.16);color:var(--cyan);border-color:rgba(89,199,255,.4)}
  .b-Contacted{background:rgba(148,163,199,.14);color:#c3d3ea}
  .b-Qualified{background:rgba(126,111,239,.16);color:#b6a9ff}
  .b-Booked{background:rgba(87,227,154,.14);color:#7bf0b4}
  .b-Won{background:rgba(87,227,154,.2);color:var(--green)}
  .b-Lost{background:rgba(255,122,138,.14);color:#ff9aa6}
  .b-Spam{background:rgba(148,163,199,.1);color:#8ea0bd}

  /* Table */
  .tablewrap{overflow-x:auto;border-radius:16px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px}
  thead th{text-align:left;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
    padding:12px 14px;background:rgba(7,23,53,.6)}
  tbody td{padding:13px 14px;border-top:1px solid var(--border)}
  tbody tr{cursor:pointer;transition:.12s}
  tbody tr:hover{background:rgba(58,166,255,.07)}
  .src{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
  .src svg{width:15px;height:15px}
  .score{font-weight:700;font-variant-numeric:tabular-nums}
  .name{font-weight:600}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:11px;
    font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--glass);color:var(--text);transition:.15s}
  .btn:hover{border-color:var(--primary)}
  .btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .btn svg{width:16px;height:16px}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--glow));border:none;color:#fff;
    box-shadow:0 6px 22px rgba(30,144,255,.4)}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-sm{padding:7px 12px;font-size:13px}
  .btn-lg{padding:13px 22px;font-size:15px}
  .btn-ghost{background:none}
  .btn-danger{border-color:rgba(255,122,138,.5);color:#ff9aa6}
  .btn-danger:hover{background:rgba(255,122,138,.12);border-color:var(--red)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}

  .bar{height:9px;border-radius:999px;background:rgba(148,163,199,.18);overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--cyan))}
  .legendrow{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin:11px 0;gap:10px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}

  /* Forms */
  .field{margin:14px 0}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border-radius:11px;background:rgba(2,11,31,.6);
    border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
  .field textarea{resize:vertical;min-height:72px}
  .field .err{color:#ff9aa6;font-size:12.5px;margin-top:6px;display:none}
  .field.invalid .err{display:block}
  .field.invalid input{border-color:var(--red)}

  /* Auth */
  .auth{min-height:100vh;display:grid;place-items:center;padding:24px}
  .authcard{width:100%;max-width:410px;background:var(--glass);border:1px solid var(--border);
    border-radius:20px;padding:28px;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .authcard h2{text-align:center;font-size:21px;margin-top:8px}
  .link{color:var(--cyan);cursor:pointer}

  /* Empty state */
  .empty{text-align:center;padding:44px 20px;color:var(--muted)}
  .empty .ic{width:56px;height:56px;border-radius:16px;background:rgba(58,166,255,.14);display:grid;place-items:center;
    color:var(--cyan);margin:0 auto 14px}
  .empty .ic svg{width:26px;height:26px}

  /* Toast */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:200;
    background:var(--glass-hi);border:1px solid var(--border-hi);color:var(--text);padding:12px 18px;border-radius:12px;
    font-size:14px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:9px;
    opacity:0;pointer-events:none;transition:.28s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast svg{width:17px;height:17px;color:var(--green)}

  .kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--border);font-size:14px}
  .kv:first-child{border-top:none}
  .kv .k{color:var(--muted)}

  .mobnav{display:none}
  .backdrop{display:none}

  @media(max-width:900px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}.cols-2{grid-template-columns:1fr}}
  @media(max-width:760px){
    .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:.25s}
    html[dir="rtl"] .sidebar{left:auto;right:0;transform:translateX(100%)}
    .sidebar.open{transform:translateX(0)}
    .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50}
    .hamb{display:grid;place-items:center}
    .content{padding:16px 14px 96px}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;
      background:rgba(7,23,53,.94);border-top:1px solid var(--border);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
      padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
    .mobnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);
      padding:4px;background:none;border:none;cursor:pointer}
    .mobnav button svg{width:21px;height:21px}
    .mobnav button.active{color:var(--cyan)}
    .search{display:none}
    .pagehead h1{font-size:20px}
    .stat .value{font-size:26px}
  }
  /* responsive lead list */
  .leadlist{display:flex;flex-direction:column;gap:10px}
  .leaditem{display:flex;gap:12px;align-items:center;text-align:left;width:100%;cursor:pointer;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:12px 14px;color:var(--text);transition:.12s}
  html[dir="rtl"] .leaditem{text-align:right}
  html[dir="rtl"] .sidebar{border-right:none;border-left:1px solid var(--border)}
  html[dir="rtl"] .li-meta .score{margin-left:0!important;margin-right:auto!important}
  .leaditem:hover{border-color:var(--primary);background:rgba(58,166,255,.06)}
  .leaditem .av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--glow))}
  .li-main{flex:1;min-width:0;display:flex;flex-direction:column}
  .li-top{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .li-sub{color:var(--muted);font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-meta{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .searchbtn{cursor:pointer;text-align:left}
  html[dir="rtl"] .searchbtn{text-align:right}
  .searchbtn span{color:var(--muted);font-size:14px}

  /* voice assistant */
  .voicecard{text-align:center}
  .vstatus{font-size:14px;color:var(--muted);margin-bottom:18px;min-height:20px}
  .vmic{width:96px;height:96px;border-radius:50%;border:none;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--primary),var(--glow));box-shadow:0 10px 34px rgba(30,144,255,.5);display:grid;place-items:center;margin:0 auto}
  .vmic svg{width:38px;height:38px}
  .vmic.on{animation:vpulse 1.2s infinite;background:linear-gradient(135deg,#ff7a8a,#ff5f57)}
  @keyframes vpulse{0%{box-shadow:0 0 0 0 rgba(255,122,138,.55)}70%{box-shadow:0 0 0 22px rgba(255,122,138,0)}100%{box-shadow:0 0 0 0 rgba(255,122,138,0)}}
  #vspeak.on{border-color:var(--red);color:#ff9aa6;background:rgba(255,122,138,.12)}
  .vlang{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
  .vtranscript{max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:8px}
  .vmsg{max-width:85%;padding:9px 13px;border-radius:13px;font-size:14px;line-height:1.4}
  .vmsg.bot{background:var(--glass-hi);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
  .vmsg.user{background:linear-gradient(135deg,rgba(58,166,255,.92),rgba(30,144,255,.92));color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
  html[dir="rtl"] .vmsg.bot{border-bottom-left-radius:13px;border-bottom-right-radius:4px}
  html[dir="rtl"] .vmsg.user{border-bottom-right-radius:13px;border-bottom-left-radius:4px}
  .vreply{display:flex;gap:8px;margin-top:16px}
  .vreply input{flex:1;padding:11px 13px;border-radius:11px;background:rgba(2,11,31,.6);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none}
  .vreply input:focus{border-color:var(--primary)}
  .vtyping{display:flex;gap:4px;align-items:center;min-height:18px}
  .vtyping span{width:7px;height:7px;border-radius:50%;background:var(--muted);opacity:.5;animation:vdot 1s infinite}
  .vtyping span:nth-child(2){animation-delay:.18s}.vtyping span:nth-child(3){animation-delay:.36s}
  @keyframes vdot{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
  .hero,.section{animation:fadeUp .55s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.vmic.on{animation:none}.vtyping span{animation:none}.hero,.section{animation:none}}

  /* landing */
  .landing{max-width:1120px;margin:0 auto;padding:20px 20px 60px}
  .lnav{display:flex;align-items:center;gap:14px;padding:9px 10px 9px 18px;position:sticky;top:12px;z-index:30;margin-bottom:6px;
    border-radius:999px;border:1px solid rgba(255,255,255,.16);isolation:isolate;
    background:linear-gradient(155deg,rgba(255,255,255,.11),rgba(255,255,255,.035));
    -webkit-backdrop-filter:blur(26px) saturate(1.9);backdrop-filter:blur(26px) saturate(1.9);
    box-shadow:0 18px 50px -16px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.28),inset 0 -1px 0 rgba(255,255,255,.06)}
  .lnav::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 42%);z-index:-1}
  .lnav .links{display:flex;gap:22px;margin-left:10px}
  .lnav .links a{color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .lnav .links a:hover{color:var(--text)}
  .lnav .brand{font-size:16px}
  .hero{text-align:center;padding:56px 10px 30px}
  .htitle{font-size:46px;line-height:1.08;font-weight:800;max-width:820px;margin:0 auto;text-wrap:balance;letter-spacing:-.5px}
  .hsub{color:var(--muted);max-width:600px;margin:18px auto 0;font-size:17px;line-height:1.55}
  .section{margin-top:56px}
  .kicker{text-transform:uppercase;letter-spacing:.14em;font-size:12px;font-weight:700;color:var(--cyan);text-align:center}
  .stitle{font-size:30px;font-weight:800;text-align:center;margin-top:8px;text-wrap:balance}
  .ssub{color:var(--muted);text-align:center;max-width:560px;margin:10px auto 0;font-size:15px}
  /* dashboard preview */
  .dashprev{margin-top:26px;border:1px solid var(--border);border-radius:20px;padding:18px;background:linear-gradient(180deg,rgba(7,23,53,.7),rgba(11,27,58,.5))}
  .dashprev .row-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .miniStat{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px}
  .miniStat .l{font-size:12px;color:var(--muted)}
  .miniStat .v{font-size:26px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .ficon{width:44px;height:44px;border-radius:12px;background:rgba(58,166,255,.14);display:grid;place-items:center;color:var(--cyan);margin-bottom:12px}
  .ficon svg{width:22px;height:22px}
  .landing .card h3{justify-content:flex-start}
  /* steps */
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:26px}
  .step{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:18px}
  .step .n{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff;font-weight:800;display:grid;place-items:center;margin-bottom:12px}
  .step p{font-size:13.5px;line-height:1.45}
  /* pricing */
  .pricegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px;align-items:start}
  .plan{background:var(--glass);border:1px solid var(--border);border-radius:18px;padding:22px;position:relative;display:flex;flex-direction:column}
  .plan.pop{border-color:var(--border-hi);box-shadow:0 12px 40px rgba(30,144,255,.22)}
  .plan .pk{font-size:16px;font-weight:800}
  .plan .amt{font-size:38px;font-weight:800;margin-top:12px;font-variant-numeric:tabular-nums}
  .plan .amt small{font-size:15px;font-weight:600;color:var(--muted)}
  .plan .setup{font-size:12.5px;color:var(--muted);margin-top:4px}
  .plan ul{list-style:none;margin:16px 0 20px;display:flex;flex-direction:column;gap:9px}
  .plan li{display:flex;gap:9px;font-size:13.5px;line-height:1.4;align-items:flex-start}

  .poptag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--primary),var(--glow));color:#fff;font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:999px;white-space:nowrap}
  .terms{text-align:center;color:var(--muted);font-size:12.5px;margin-top:16px}
  /* contact */
  .contactcard{margin-top:28px;border:1px solid var(--border);border-radius:20px;padding:30px;text-align:center;background:linear-gradient(180deg,rgba(7,23,53,.7),rgba(11,27,58,.4))}
  .contactrow{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-top:18px}
  .cinfo{display:flex;align-items:center;gap:9px;font-size:15px}
  .cinfo svg{width:18px;height:18px;color:var(--cyan)}
  .lfoot{text-align:center;color:var(--muted);font-size:12.5px;margin-top:48px;line-height:1.7}
  .lfoot .discl{font-size:11px;max-width:640px;margin:10px auto 0;opacity:.8}
  @media(max-width:900px){.dashprev .row-stats{grid-template-columns:repeat(2,1fr)}.steps{grid-template-columns:1fr 1fr}.pricegrid{grid-template-columns:1fr}}
  @media(max-width:760px){.htitle{font-size:32px}.hsub{font-size:15px}.hero{padding:34px 6px 24px}.lnav .links{display:none}.stitle{font-size:24px}.steps{grid-template-columns:1fr}}

  /* ===== Liquid glass + animated background (v2) ===== */
  #bgfx{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none;contain:strict}
  #bgfx .blob{position:absolute;border-radius:50%;filter:blur(56px);opacity:.42;will-change:transform;transform:translateZ(0);backface-visibility:hidden}
  #bgfx .b1{width:46vw;height:46vw;left:-6vw;top:-12vw;background:radial-gradient(circle at 30% 30%,#1E90FF,transparent 68%);animation:drift1 34s ease-in-out infinite}
  #bgfx .b2{width:40vw;height:40vw;right:-8vw;top:8vh;background:radial-gradient(circle at 60% 40%,#7E6FEF,transparent 68%);animation:drift2 40s ease-in-out infinite}
  #bgfx .b3{width:38vw;height:38vw;left:20vw;bottom:-14vw;background:radial-gradient(circle at 50% 50%,#59C7FF,transparent 68%);opacity:.32;animation:drift3 46s ease-in-out infinite}
  #bgfx .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(120,170,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,255,.045) 1px,transparent 1px);background-size:48px 48px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 78%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 78%)}
  @keyframes drift1{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(5vw,3vh,0)}}
  @keyframes drift2{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(-4vw,5vh,0)}}
  @keyframes drift3{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(3vw,-4vh,0)}}
  @media(prefers-reduced-motion:reduce){#bgfx .blob{animation:none}}

  .glass{position:relative;border:1px solid var(--glassborder);border-radius:20px;
    background:linear-gradient(160deg,rgba(255,255,255,.065),rgba(255,255,255,.02));
    -webkit-backdrop-filter:blur(10px) saturate(1.4);backdrop-filter:blur(10px) saturate(1.4);
    box-shadow:0 18px 50px -18px rgba(0,0,0,.55),inset 0 1px 0 var(--glasshi)}
  .landing .card,.dashprev,.step,.plan,.contactcard{position:relative;border:1px solid var(--glassborder);
    background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    -webkit-backdrop-filter:blur(9px) saturate(1.3);backdrop-filter:blur(9px) saturate(1.3);
    box-shadow:0 16px 44px -20px rgba(0,0,0,.5),inset 0 1px 0 var(--glasshi)}
  .landing .card{transition:transform .2s ease,box-shadow .2s ease}
  @media(hover:hover){.landing .card:hover{transform:translateY(-4px);box-shadow:0 26px 60px -22px rgba(30,144,255,.4),inset 0 1px 0 var(--glasshi)}}
  .landing p svg,.hsub svg{width:15px;height:15px;vertical-align:middle}
  .btn-lg svg,.btn svg{width:16px;height:16px}
  .badge svg{width:14px;height:14px;flex-shrink:0}
  .landing svg{max-width:100%}

  /* logo mark */
  .brand .logo{background:linear-gradient(140deg,#0a1a3a,#0c2350);border:1px solid rgba(120,180,255,.3);box-shadow:0 0 16px rgba(58,166,255,.35),inset 0 1px 0 rgba(255,255,255,.14)}
  .brand .logo svg{width:22px;height:22px}

  /* hero pill CTAs */
  .hero .btn-lg{border-radius:14px}

  /* browser-chrome dashboard mockup */
  .mock{margin-top:26px;border-radius:20px;overflow:hidden}
  .mockbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--glassborder);background:rgba(255,255,255,.03)}
  .mockbar .dots{display:flex;gap:6px}
  .mockbar .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .mockbar .url{flex:1;text-align:center;font-size:12px;color:var(--muted);background:rgba(0,0,0,.28);border:1px solid var(--glassborder);border-radius:8px;padding:5px 12px;max-width:340px;margin:0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .livechip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--green);background:rgba(87,227,154,.14);border:1px solid rgba(87,227,154,.35);padding:4px 10px;border-radius:999px}
  .livechip i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:vpulse2 1.6s infinite}
  @keyframes vpulse2{0%{box-shadow:0 0 0 0 rgba(87,227,154,.6)}70%{box-shadow:0 0 0 7px rgba(87,227,154,0)}100%{box-shadow:0 0 0 0 rgba(87,227,154,0)}}
  .mockbody{padding:18px}
  .mockstats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .mstat{border:1px solid var(--glassborder);border-radius:14px;padding:14px;background:rgba(255,255,255,.03);position:relative}
  .mstat .delta{position:absolute;top:12px;right:12px;font-size:11px;font-weight:700;color:var(--green);background:rgba(87,227,154,.14);border-radius:999px;padding:2px 7px}
  html[dir="rtl"] .mstat .delta{right:auto;left:12px}
  .mstat .l{font-size:12px;color:var(--muted)}
  .mstat .v{font-size:26px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums}
  .mocktable{margin-top:16px;border:1px solid var(--glassborder);border-radius:14px;overflow:hidden}
  .mth{display:flex;align-items:center;gap:12px;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:rgba(255,255,255,.03);border-bottom:1px solid var(--glassborder)}
  .mtr{display:flex;align-items:center;gap:12px;padding:12px 14px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,.05)}
  .mtr:last-child{border-bottom:none}
  .mtr .c1{flex:1.4;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtr .c2{flex:1.6;color:var(--muted);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtr .c3{width:74px}.mtr .c4{width:92px;text-align:right}
  .mth .c1{flex:1.4}.mth .c2{flex:1.6}.mth .c3{width:74px}.mth .c4{width:92px;text-align:right}
  .utag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .u-hot{color:#ff9aa6;background:rgba(255,122,138,.15);border:1px solid rgba(255,122,138,.35)}
  .u-warm{color:var(--amber);background:rgba(251,191,90,.14);border:1px solid rgba(251,191,90,.32)}
  @media(max-width:760px){.mockstats{grid-template-columns:repeat(2,1fr)}.mtr .c2{display:none}.mocktable{font-size:12px}}

  /* numbered steps 01–05 */
  .step{position:relative;overflow:hidden}
  .step .n{width:auto;height:auto;background:none;box-shadow:none;font-size:30px;font-weight:800;
    background-image:linear-gradient(135deg,var(--primary),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;font-variant-numeric:tabular-nums}

  /* contact form */
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;margin-top:26px;text-align:left}
  html[dir="rtl"] .form2{text-align:right}
  .form2 .full{grid-column:1 / -1}
  .form2 label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .form2 input,.form2 select,.form2 textarea{width:100%;padding:12px 14px;border-radius:12px;font-size:14px;color:var(--text);font-family:inherit;outline:none;
    border:1px solid var(--glassborder);background:rgba(2,11,31,.45);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .form2 input:focus,.form2 select:focus,.form2 textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(58,166,255,.16)}
  .form2 textarea{min-height:96px;resize:vertical}
  .form2 .actions{grid-column:1 / -1;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:4px}
  .contactcard{text-align:left;padding:30px}
  html[dir="rtl"] .contactcard{text-align:right}
  .contactcard .kicker,.contactcard .stitle,.contactcard .ssub{text-align:center}

  /* richer footer */
  .lfoot2{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:26px;margin-top:60px;padding-top:28px;border-top:1px solid var(--glassborder);text-align:left}
  html[dir="rtl"] .lfoot2{text-align:right}
  .lfoot2 h4{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;font-weight:700}
  .lfoot2 a,.lfoot2 .fitem{display:block;color:var(--muted);font-size:13.5px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .lfoot2 a:hover{color:var(--text)}
  .lfoot2 .tag{font-size:13px;line-height:1.6;margin-top:10px}
  .lfootbase{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;padding-top:20px;border-top:1px solid var(--glassborder);line-height:1.7}
  .lfootbase .discl{font-size:11px;max-width:680px;margin:8px auto 0;opacity:.75}
  @media(max-width:760px){.lfoot2{grid-template-columns:1fr;gap:22px}.form2{grid-template-columns:1fr}}

  /* ===== Responsive + performance (v3) ===== */
  .htitle{font-size:clamp(28px,5.2vw,46px)}
  .stitle{font-size:clamp(22px,3.4vw,30px)}
  .hsub{font-size:clamp(15px,1.7vw,17px)}
  /* tablet */
  @media(max-width:1024px){
    .landing{padding:16px 18px 56px}
    .lnav{gap:10px;padding:9px 8px 9px 16px}
    .lnav .links{gap:15px;margin-left:6px}
    .section{margin-top:46px}
    .grid.cols-4{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:860px){.lnav .links a:nth-child(4){display:none}}
  /* small phones */
  @media(max-width:560px){
    .mockstats{grid-template-columns:repeat(2,1fr)}
    .hero .row{flex-direction:column;align-items:stretch}
    .hero .row .btn-lg{width:100%}
    .contactcard{padding:22px 16px}
    .mockbar .url{font-size:11px}
    .lnav{padding:8px 8px 8px 12px}
    .lnav .brand{font-size:14px}
    .langsw button{padding:6px 8px;font-size:11.5px}
  }
  /* phones: drop GPU-heavy blur + background motion for smoothness */
  @media(max-width:820px){
    #bgfx .blob{animation:none;filter:blur(46px);opacity:.32}
    .glass,.landing .card,.dashprev,.step,.plan,.contactcard{
      -webkit-backdrop-filter:none;backdrop-filter:none;
      background:linear-gradient(160deg,rgba(20,34,66,.94),rgba(10,22,46,.9))}
    /* keep the top nav as true liquid glass (small area = cheap) */
    .lnav{-webkit-backdrop-filter:blur(22px) saturate(1.8);backdrop-filter:blur(22px) saturate(1.8);
      background:linear-gradient(155deg,rgba(255,255,255,.12),rgba(255,255,255,.04))}
    .topbar{-webkit-backdrop-filter:blur(16px) saturate(1.5);backdrop-filter:blur(16px) saturate(1.5);background:rgba(6,17,38,.66)}
    .sidebar,.mobnav{-webkit-backdrop-filter:none;backdrop-filter:none;background:rgba(7,20,44,.98)}
  }
  /* coarse pointers (phones/tablets): lighter background even on larger tablets */
  @media(hover:none) and (pointer:coarse){
    #bgfx .blob{animation:none}
  }

  /* ===================== CRM Integrations ===================== */
  .crmsum{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .provgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .provcard{display:flex;flex-direction:column;gap:12px}
  .provhead{display:flex;align-items:center;gap:12px}
  .provlogo{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;color:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 6px 16px -6px rgba(0,0,0,.6)}
  .provlogo svg{width:24px;height:24px}
  .provname{font-weight:700;font-size:15px}
  .provmeta{font-size:12.5px;color:var(--muted);margin-top:1px}
  .provhead .spacer{flex:1}

  .cs i{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block;flex-shrink:0}

  .cs-connecting{color:var(--cyan);background:rgba(89,199,255,.12);border-color:rgba(89,199,255,.32)}
  .cs-paused{color:#c3d3ea;background:rgba(148,163,199,.14)}
  .cs-attention{color:var(--amber);background:rgba(251,191,90,.12);border-color:rgba(251,191,90,.3)}
  .cs-expired{color:#ffb27a;background:rgba(255,150,90,.12);border-color:rgba(255,150,90,.3)}
  .cs-error{color:#ff9aa6;background:rgba(255,122,138,.12);border-color:rgba(255,122,138,.32)}
  .cs-disabled,.cs-disconnected,.cs-none{color:var(--muted);background:rgba(148,163,199,.1)}
  .cs-soon{color:#b6a9ff;background:rgba(126,111,239,.14);border-color:rgba(126,111,239,.3)}
  .connmeta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 14px;margin:6px 0 2px}
  .connmeta .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .connmeta .v{font-size:13.5px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
  .connactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .taglist{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .tagpill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:rgba(58,166,255,.1);border:1px solid var(--border);color:var(--cyan)}
  .archnote{display:flex;gap:13px;align-items:flex-start;font-size:13px;line-height:1.6}
  .archnote .ai{width:38px;height:38px;border-radius:11px;background:rgba(58,166,255,.12);color:var(--cyan);display:grid;place-items:center;flex-shrink:0}
  .archnote .ai svg{width:20px;height:20px}
  .flowchips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;font-size:12px}
  .flowchip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;border:1px solid var(--border);background:rgba(2,11,31,.4);font-weight:600}
  .flowchip svg{width:14px;height:14px;color:var(--cyan)}
  .flowarr{color:var(--muted)}
  html[dir="rtl"] .flowarr{transform:scaleX(-1)}

  /* modal */
  .modal{position:fixed;inset:0;z-index:120;display:grid;place-items:center;padding:16px;background:rgba(2,8,22,.66);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);animation:fadeUp .2s ease both}
  .modalcard{width:100%;max-width:580px;max-height:90vh;overflow:auto;border-radius:20px;border:1px solid var(--border-hi);
    background:linear-gradient(160deg,rgba(16,30,60,.99),rgba(9,20,42,.99));box-shadow:0 30px 90px -20px rgba(0,0,0,.75)}
  .modalhead{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;

  .modalhead h3{font-size:16px;font-weight:800;flex:1;min-width:0}

  .modalx:hover{color:var(--text);border-color:var(--primary)}
  .modalx svg{width:16px;height:16px}
  .modalbody{padding:20px}
  .wizsteps{display:flex;gap:5px;padding:14px 20px 0}
  .wizsteps .wd{flex:1;height:4px;border-radius:999px;background:rgba(148,163,199,.2)}
  .wizsteps .wd.on{background:linear-gradient(90deg,var(--primary),var(--cyan))}
  .wizsteps .wd.done{background:var(--green)}

  .wiztitle{font-size:18px;font-weight:800;margin:4px 0 6px;text-wrap:balance}

  html[dir="rtl"] .chk{text-align:right}
  .chk:hover{border-color:var(--primary)}
  .chk.on{border-color:var(--primary);background:rgba(58,166,255,.1)}
  .chk .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border-hi);flex-shrink:0;display:grid;place-items:center;color:transparent;margin-top:1px}

  .chk .box svg{width:13px;height:13px}
  .chk .ct{font-size:13.5px;font-weight:700}
  .chk .cd{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}

  .maprow .ma{color:var(--muted);flex-shrink:0}

  .authsim .big svg{width:32px;height:32px}
  .testcard{border:1px solid var(--border);border-radius:12px;padding:6px 14px;background:rgba(2,11,31,.4);font-size:13px}

/* ============================ Security (hashing, lockout, session expiry) ============================ */
/*SHA*/
function sha256hex(str){
  var ascii;try{ascii=unescape(encodeURIComponent(String(str)))}catch(e){ascii=String(str)}
  function rr(v,a){return (v>>>a)|(v<<(32-a))}
  var maxWord=Math.pow(2,32),result='',i,j;
  var words=[],asciiBitLength=ascii.length*8;
  var hash=sha256hex.h=sha256hex.h||[],k=sha256hex.k=sha256hex.k||[];
  var primeCounter=k.length,isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate)isComposite[i]=candidate;
      hash[primeCounter]=(Math.pow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(Math.pow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    j=ascii.charCodeAt(i);if(j>>8)j=63;
    words[i>>2]|=j<<((3-i)%4*8);
  }
  words[words.length]=(asciiBitLength/maxWord)|0;
  words[words.length]=asciiBitLength;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16),oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++){for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16)}}
  return result;
}
/*ENDSHA*/
var HASH_ITER=2048;
function hashPass(pass,salt){var h=salt+'|'+pass;for(var i=0;i<HASH_ITER;i++){h=sha256hex(h)}return h}
function makeSalt(){
  try{var a=new Uint8Array(16);(window.crypto||window.msCrypto).getRandomValues(a);
    var s='';for(var i=0;i<a.length;i++){s+=('0'+a[i].toString(16)).slice(-2)}return s}
  catch(e){return (Date.now().toString(36)+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2)).slice(0,32)}
}
function passOK(p){return typeof p==='string'&&p.length>=8&&/[A-Za-z]/.test(p)&&/[0-9]/.test(p)}
var LOCK_MAX=5,LOCK_MS=5*60000,SESSION_MS=14*86400000;
function lockCheck(email){var lk=DB.get('ag_lock',{}),r=lk[email];if(r&&r.until&&r.until>Date.now())throw new Error('Too many failed attempts. Please try again in a few minutes.')}
function lockFail(email){var lk=DB.get('ag_lock',{}),r=Object.prototype.hasOwnProperty.call(lk,email)?lk[email]:{n:0};r.n=(r.n||0)+1;if(r.n>=LOCK_MAX){r.locks=(r.locks||0)+1;r.until=Date.now()+LOCK_MS*Math.min(8,Math.pow(2,r.locks-1));r.n=0}lk[email]=r;DB.set('ag_lock',lk)}
function lockClear(email){var lk=DB.get('ag_lock',{});if(lk[email]){delete lk[email];DB.set('ag_lock',lk)}}

/* ============================ Auth ============================ */
var AUTH={
  users:function(){return DB.get('ag_users',{})},
  session:function(){var s=DB.get('ag_session',null);if(s&&s.at&&(Date.now()-s.at)>SESSION_MS){DB.del('ag_session');return null}return s},
  current:function(){var s=AUTH.session();return s?AUTH.users()[s.email]:null},
  signup:function(name,biz,email,pass){
    email=(email||'').toLowerCase().trim();
    if(!name||!name.trim()||!biz||!biz.trim()||!email) throw new Error('Please fill in every field.');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)||/^(__proto__|constructor|prototype)$/.test(email)) throw new Error('Please enter a valid email address.');
    if(!passOK(pass)) throw new Error('Password must be at least 8 characters and include a letter and a number.');
    var users=AUTH.users();
    if(users[email]) throw new Error('An account with this email already exists.');
    var salt=makeSalt();
    users[email]={name:name.trim().slice(0,60),biz:biz.trim().slice(0,80),email:email,salt:salt,pass:hashPass(pass,salt),created:Date.now()};
    DB.set('ag_users',users);
    AUTH.login(email,pass);
  },
  login:function(email,pass){
    email=(email||'').toLowerCase().trim();
    if(!email||/^(__proto__|constructor|prototype)$/.test(email)) throw new Error('Incorrect email or password.');
    lockCheck(email);
    var users=AUTH.users(),u=Object.prototype.hasOwnProperty.call(users,email)?users[email]:null,ok=false;
    if(u){
      if(u.salt){ok=(u.pass===hashPass(pass,u.salt))}
      else{
        var legacy=null;try{legacy=btoa(pass)}catch(e){}
        ok=(legacy!=null&&u.pass===legacy);
        if(ok){u.salt=makeSalt();u.pass=hashPass(pass,u.salt);users[email]=u;DB.set('ag_users',users)}
      }
    }
    if(!ok){lockFail(email);throw new Error('Incorrect email or password.')}
    lockClear(email);
    DB.set('ag_session',{email:email,at:Date.now()});
    seedIfNeeded(email);
  },
  logout:function(){DB.del('ag_session')}
};

  var leads=getLeads();

  es:['google español','microsoft elvira','microsoft dalia','mónica','monica','paulina','marisol','helena'],
  ar:['google العربية','microsoft hala','microsoft salma','microsoft amany','maged','tarik','laila']
};
function vPickVoice(code){
  try{
    if(!window.speechSynthesis)return null;
    var vs=window.speechSynthesis.getVoices()||[];
    var pre=(code||'en').slice(0,2).toLowerCase();
    var pref=VPREF[pre]||[];
    var m=vs.filter(function(v){return (v.lang||'').toLowerCase().indexOf(pre)===0});
    if(!m.length)m=vs;
    var score=function(v){var n=((v.name||'')+' '+(v.lang||'')).toLowerCase();var s=0;
      for(var i=0;i<pref.length;i++){if(n.indexOf(pref[i])>=0){s+=40-i;break}}
      if(/natural|neural|premium|enhanced/.test(n))s+=8;
      if(/female|libby|sonia|aria|samantha|serena|karen|elvira|dalia|hala|salma|monica|mónica/.test(n))s+=6;
      if(/google/.test(n))s+=4;
      if(pre==='en'&&/gb|united kingdom|british/.test(n))s+=3;
      if(v.localService===false)s+=2;
      if(/\bmale\b|daniel|arthur|george|jorge|diego|maged|tarik/.test(n))s-=4;
      return s};
    m.sort(function(a,b){return score(b)-score(a)});
    return m[0]||null
  }catch(e){return null}
}
function vUnlock(){try{if(window.speechSynthesis&&!VOICE.unlocked){var u=new SpeechSynthesisUtterance(' ');u.volume=0;window.speechSynthesis.speak(u);VOICE.unlocked=true}}catch(e){}}
/* read long digit runs (phone numbers) one digit at a time so TTS never says "million" */
function normDigits(s){return String(s||'').replace(/[٠-٩]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-1632+48)}).replace(/[۰-۹]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-1776+48)})}
function speechClean(text){return String(text).replace(/[+]?\d[\d ]{3,}\d/g,function(m){var ds=m.replace(/[^\d]/g,'');return ds.length>=7?ds.split('').join(' '):m})}
function say(text){try{if(!window.speechSynthesis)return;var sp=window.speechSynthesis;var u=new SpeechSynthesisUtterance(speechClean(text));u.rate=(LANG==='ar'?0.9:0.95);u.pitch=(LANG==='ar'?1.0:1.06);u.volume=1;u.lang=TTSLANG[LANG]||'en-GB';var v=vPickVoice(u.lang);if(v)u.voice=v;sp.cancel();sp.speak(u)}catch(e){}}

function vBotSay(txt){
  /* if a reply is still "typing", flush it into the transcript instead of dropping it */
  if(VOICE.timer){clearTimeout(VOICE.timer);VOICE.timer=null;
    if(VOICE.pendingTxt){vTyping(false);vAddMsg('bot',VOICE.pendingTxt);VOICE.pendingTxt=null}}
  VOICE.pendingTxt=txt;
  vTyping(true);
  var base=(window.V_DELAY!=null?window.V_DELAY:700);
  var dl=base?base+Math.floor(Math.random()*400):0;
  VOICE.timer=setTimeout(function(){VOICE.timer=null;VOICE.pendingTxt=null;vTyping(false);vAddMsg('bot',txt);say(txt)},dl)
}

/* ---- smart validation: reject gibberish and re-ask politely ---- */
function vHasLetter(s){return /[A-Za-zÀ-ɏ؀-ۿ]/.test(String(s||''))}
function vDigits(s){return (normDigits(String(s||'')).match(/\d/g)||[]).length}
function vValidName(s){s=String(s||'').trim();return s.length>=1&&s.length<=60&&vHasLetter(s)}
function vValidService(s){s=String(s||'').trim();return s.length>=2&&vHasLetter(s)}
function vValidPhone(s){return vDigits(s)>=7}
function vRefusal(s){s=' '+String(s||'').toLowerCase()+' ';return /\b(no|nope|nah|skip|later|luego|لا)\b/.test(s)||/rather not|prefer not|don'?t have|no thanks|no gracias|prefiero no|call me|email me|لا شكرا|لاحقا|تخطي/.test(s)}
function vClearUrgency(s){s=' '+String(s||'').toLowerCase()+' ';
  return /(urgent|asap|emergency|today|right now|straight away|leak|no hot water|broken|soon|plan|ahead|no rush|whenever|browsing|quote|enquiry|urgente|hoy|emergencia|prisa|luego|más tarde|planific|عاجل|طارئ|اليوم|لاحق|لا يوجد|ليس|تخطيط)/.test(s)||/\b(yes|no|yeah|yep|nope|sí|si|نعم|لا)\b/.test(s)}
function vValidate(key,v){
  if(key==='name')return {ok:vValidName(v),msg:'v_retry_name',max:1};
  if(key==='service')return {ok:vValidService(v),msg:'v_retry_service',max:1};
  if(key==='urgency')return {ok:vClearUrgency(v),msg:'v_retry_urgency',max:1};
  if(key==='phone')return {ok:vValidPhone(v)||vRefusal(v),msg:'v_retry_phone',max:1};
  return {ok:true};
}
function voiceSend(){
  if(!VOICE.active){vSetStatus(t('v_tap_start_first'));return}
  var i=document.getElementById('vinput');if(!i)return;var v=(i.value||'').trim();if(!v)return;i.value='';
  vAddMsg('user',v);
  var key=VQ[VOICE.step].key,vd=vValidate(key,v);
  if(!vd.ok){
    VOICE.retry[key]=(VOICE.retry[key]||0)+1;
    if(VOICE.retry[key]<=vd.max){vSetStatus(t('v_your_turn'));vBotSay(t(vd.msg));i.focus();return}
    if(key==='name'||key==='service')v='';
  }
  VOICE.data[key]=v;
  if(key==='urgency'){VOICE.urgent=(vUrgency(v)==='High')}
  VOICE.step++;
  if(VOICE.step<VQ.length){vAsk();i.focus()}else{vFinish()}
}

function voiceListen(){
  if(!VOICE.active){voiceStart();return}
  if(!vRecAvailable()){var i=document.getElementById('vinput');if(i)i.focus();vSetStatus(t('v_no_mic'));return}
  if(VOICE.listening){try{if(VOICE.rec)VOICE.rec.stop()}catch(e){}return}
  try{
    if(VOICE.rec){try{VOICE.rec.abort()}catch(e){}}
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR();
    VOICE.rec=rec;VOICE.listening=true;
    rec.lang=TTSLANG[LANG]||'en-GB';rec.interimResults=true;rec.maxAlternatives=1;rec.continuous=false;
    try{if(window.speechSynthesis)window.speechSynthesis.cancel()}catch(e){}
    vListenUI(true);vSetStatus(t('v_listening'));
    var finalT='';
    rec.onresult=function(ev){var interim='';for(var i=ev.resultIndex;i<ev.results.length;i++){var r=ev.results[i];if(r.isFinal)finalT+=r[0].transcript;else interim+=r[0].transcript}var inp=document.getElementById('vinput');if(inp)inp.value=(finalT+' '+interim).trim()};
    rec.onerror=function(ev){VOICE.listening=false;vListenUI(false);var err=(ev&&ev.error)||'';if(err==='not-allowed'||err==='service-not-allowed'){vSetStatus(t('v_mic_denied'))}else if(err==='no-speech'){vSetStatus(t('v_your_turn'))}else{vSetStatus(t('v_your_turn'))}};
    rec.onend=function(){VOICE.listening=false;vListenUI(false);var inp=document.getElementById('vinput');if(inp&&inp.value.trim()&&VOICE.active){voiceSend()}else if(VOICE.active){vSetStatus(t('v_your_turn'))}};
    rec.start()
  }catch(e){VOICE.listening=false;vListenUI(false);vSetStatus(t('v_your_turn'))}
}

/* ---- HMAC-SHA256 (byte-accurate) so every event carries a real signature, matching spec §6.1 ---- */
function sha256bytes(str){
  var ascii=String(str);
  function rr(v,a){return (v>>>a)|(v<<(32-a))}
  var maxWord=Math.pow(2,32),result='',i,j;
  var words=[],asciiBitLength=ascii.length*8;
  var hash=sha256bytes.h=sha256bytes.h||[],k=sha256bytes.k=sha256bytes.k||[];
  var primeCounter=k.length,isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate)isComposite[i]=candidate;
      hash[primeCounter]=(Math.pow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(Math.pow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    j=ascii.charCodeAt(i);if(j>>8)j=63;
    words[i>>2]|=j<<((3-i)%4*8);
  }
  words[words.length]=(asciiBitLength/maxWord)|0;
  words[words.length]=asciiBitLength;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16),oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++){for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16)}}
  return result;
}
function _hexToBytes(h){var s='';for(var i=0;i<h.length;i+=2)s+=String.fromCharCode(parseInt(h.substr(i,2),16));return s}
function _utf8(s){try{return unescape(encodeURIComponent(String(s)))}catch(e){return String(s)}}
function hmacSha256(key,msg){
  key=_utf8(key);msg=_utf8(msg);
  if(key.length>64)key=_hexToBytes(sha256bytes(key));
  while(key.length<64)key+='\x00';
  var ip='',op='';
  for(var i=0;i<64;i++){var c=key.charCodeAt(i);ip+=String.fromCharCode(c^0x36);op+=String.fromCharCode(c^0x5c)}
  return sha256bytes(op+_hexToBytes(sha256bytes(ip+msg)));
}

    metadata:{environment:'production',schema_version:'1'}};
}
function crmSign(ts,body){return 'sha256='+hmacSha256(CRM_SECRET,ts+'.'+body)}

/* ---- Storage (per account): { conns, events, syncs{connId|leadId}, attempts } ---- */
function crmKey(e){return 'ag_crm_'+e}
function crmState(){var s=AUTH.session();if(!s)return{conns:[],events:[],syncs:{},attempts:[]};
  var d=DB.get(crmKey(s.email),null);if(!d){d=crmSeed();DB.set(crmKey(s.email),d)}return d}
function crmSave(st){var s=AUTH.session();if(s)DB.set(crmKey(s.email),st)}
function crmFindConn(st,id){for(var i=0;i<st.conns.length;i++)if(st.conns[i].id===id)return st.conns[i];return null}
function crmRecordSync(st,conn,lead,fail,ts){
  ts=ts||Date.now();
  var key=conn.id+'|'+lead.id, evId='evt_'+crmRand(22);
  var env=crmEnvelope('lead.created',lead,conn);env.event_id=evId;var body=JSON.stringify(env);
  if(fail){
    st.syncs[key]={connection_id:conn.id,provider:conn.provider,lead_id:lead.id,lead_name:lead.name,status:'failed',ext:{},last_event:evId,last_synced:null,error:{code:'RATE_LIMITED',msg:'Provider rate limit exceeded.',retryable:true},created:ts,updated:ts,url:''};
    st.attempts.unshift({id:'att_'+crmRand(8),event_id:evId,conn:conn.id,provider:conn.provider,lead_id:lead.id,lead_name:lead.name,event_type:'lead.created',n:1,status:'failed',code:429,error:'RATE_LIMITED',actions:[],at:ts});
    st.events.unshift({event_id:evId,event_type:'lead.created',entity_id:lead.id,lead_name:lead.name,status:'failed',attempt_count:1,at:ts,ts:Math.floor(ts/1000),sig:crmSign(Math.floor(ts/1000),body),body:body});
  }else{
    var ext={contact:crmExtId(conn.provider,'contact')};
    if((conn.actions||[]).indexOf('deal')>=0)ext.deal=crmExtId(conn.provider,'deal');
    st.syncs[key]={connection_id:conn.id,provider:conn.provider,lead_id:lead.id,lead_name:lead.name,status:'synced',ext:ext,last_event:evId,last_synced:ts,error:null,created:ts,updated:ts,url:crmRecordUrl(conn,ext)};
    st.attempts.unshift({id:'att_'+crmRand(8),event_id:evId,conn:conn.id,provider:conn.provider,lead_id:lead.id,lead_name:lead.name,event_type:'lead.created',n:1,status:'success',code:201,actions:crmActionsList(conn,true),at:ts});
    st.events.unshift({event_id:evId,event_type:'lead.created',entity_id:lead.id,lead_name:lead.name,status:'processed',attempt_count:1,at:ts,ts:Math.floor(ts/1000),sig:crmSign(Math.floor(ts/1000),body),body:body});
  }
}
function crmSeed(){
  var now=Date.now(),m=60000,h=3600000,day=86400000;
  var conn={id:'conn_hub_demo',provider:'hubspot',name:'HubSpot',status:'connected',account:'Bright Smile Dental',portal:'24428135',
    sync_enabled:true,triggers:['lead.created','lead.status_changed','lead.qualified','lead.booked','lead.won'],
    actions:['contact','deal','note'],pipeline:'Sales Pipeline',stage:'New Lead',owner:'Front desk',
    tags:['alsaiti-voice','voice-call'],mapping:crmDefaultMapping(),synced:0,
    last_success:now-9*m,last_failure:null,last_error:null,connected_at:now-6*day,tested_at:now-9*m,health:'healthy'};
  var st={conns:[conn],events:[],syncs:{},attempts:[]};
  try{
    var leads=getLeads().slice(0,4);
    leads.forEach(function(l,i){crmRecordSync(st,conn,l,(i===3),now-((i+1)*23)*m)});
    conn.synced=Math.min(3,leads.length);
    if(leads.length>3){conn.last_failure=now-2*h;conn.last_error={code:'RATE_LIMITED',msg:'Provider rate limit exceeded.',retryable:true};conn.health='attention'}
  }catch(e){}
  return st;
}

/* ---- Emit: create a signed event, route to connected providers, record sync results ---- */
function crmEmit(eventType,lead){
  try{
    if(!lead||!lead.id)return 0;
    var st=crmState(),ts=Math.floor(Date.now()/1000);
    var routed=st.conns.filter(function(c){return c.sync_enabled&&c.status==='connected'&&(c.triggers||[]).indexOf(eventType)>=0});
    var env=crmEnvelope(eventType,lead,routed[0]);var body=JSON.stringify(env);
    st.events.unshift({event_id:env.event_id,event_type:eventType,entity_id:lead.id,lead_name:lead.name,status:routed.length?'processed':'no_route',attempt_count:routed.length?1:0,at:Date.now(),ts:ts,sig:crmSign(ts,body),body:body});
    if(st.events.length>80)st.events.length=80;
    routed.forEach(function(c){
      var key=c.id+'|'+lead.id,existing=st.syncs[key];
      var ext=(existing&&existing.ext&&existing.ext.contact)?existing.ext:{contact:crmExtId(c.provider,'contact')};
      if((c.actions||[]).indexOf('deal')>=0&&!ext.deal)ext.deal=crmExtId(c.provider,'deal');
      var isUpdate=!!(existing&&existing.status==='synced');
      st.syncs[key]={connection_id:c.id,provider:c.provider,lead_id:lead.id,lead_name:lead.name,status:'synced',ext:ext,last_event:env.event_id,last_synced:Date.now(),error:null,created:existing?existing.created:Date.now(),updated:Date.now(),url:crmRecordUrl(c,ext)};
      if(!isUpdate)c.synced=(c.synced||0)+1;
      c.last_success=Date.now();c.health='healthy';c.last_error=null;
      st.attempts.unshift({id:'att_'+crmRand(8),event_id:env.event_id,conn:c.id,provider:c.provider,lead_id:lead.id,lead_name:lead.name,event_type:eventType,n:1,status:'success',code:isUpdate?200:201,actions:crmActionsList(c,!isUpdate),at:Date.now()});
    });
    if(st.attempts.length>120)st.attempts.length=120;
    crmSave(st);return routed.length;
  }catch(e){return 0}
}
function crmStatusEvents(status){var out=['lead.status_changed'];var m={Qualified:'lead.qualified',Booked:'lead.booked',Won:'lead.won'};if(m[status])out.push(m[status]);return out}
function crmEmitStatus(lead){var evs=crmStatusEvents(lead.status),n=0;evs.forEach(function(e){n+=crmEmit(e,lead)});return n}

/* ---- Connection controls ---- */
function crmRetry(connId,leadId){
  var st=crmState(),c=crmFindConn(st,connId);if(!c)return;
  var key=connId+'|'+leadId,rec=st.syncs[key];if(!rec)return;
  var ext={contact:crmExtId(c.provider,'contact')};if((c.actions||[]).indexOf('deal')>=0)ext.deal=crmExtId(c.provider,'deal');
  rec.status='synced';rec.ext=ext;rec.error=null;rec.last_synced=Date.now();rec.updated=Date.now();rec.url=crmRecordUrl(c,ext);
  c.synced=(c.synced||0)+1;c.last_success=Date.now();c.last_error=null;c.health='healthy';
  st.attempts.unshift({id:'att_'+crmRand(8),event_id:rec.last_event||('evt_'+crmRand(22)),conn:c.id,provider:c.provider,lead_id:leadId,lead_name:rec.lead_name,event_type:'lead.created',n:2,status:'success',code:201,actions:crmActionsList(c,true),at:Date.now()});
  crmSave(st);render();toast(t('toast_retried'));
}
function crmPause(id){var st=crmState(),c=crmFindConn(st,id);if(!c)return;c.sync_enabled=false;crmSave(st);render();toast(t('toast_paused'))}
function crmResume(id){var st=crmState(),c=crmFindConn(st,id);if(!c)return;c.sync_enabled=true;c.status='connected';crmSave(st);render();toast(t('toast_resumed'))}
function crmTestConn(id){var st=crmState(),c=crmFindConn(st,id);if(!c)return;c.tested_at=Date.now();c.health='healthy';c.last_error=null;crmSave(st);render();toast(t('toast_tested'))}
function crmDisconnect(id){var st=crmState(),c=crmFindConn(st,id);if(!c)return;
  var ok=true;try{ok=confirm(tf('confirm_disconnect',{p:c.name}))}catch(e){ok=true}if(!ok)return;
  c.status='disconnected';c.sync_enabled=false;c.disconnected_at=Date.now();crmSave(st);render();toast(tf('toast_disconnected',{p:c.name}))}

  if(i===4)return '<div class="wiztitle">'+esc(t('wz5'))+'</div><p class="wizsub">'+esc(tf('wz5s',{p:p.name}))+'</p><div class="checklist">'+
    CRM_ACTIONS.map(function(ac){return crmChk('actions',ac[0],t(ac[1]),'',!!d.actions[ac[0]])}).join('')+'</div>';
  if(i===5)return '<div class="wiztitle">'+esc(t('wz6'))+'</div><p class="wizsub">'+esc(tf('wz6s',{p:p.name}))+'</p><div class="maptable">'+
    d.mapping.map(function(mp,idx){return '<div class="maprow"><span class="mf">'+esc(t('lead_field_'+mp.from))+'</span><span class="ma">'+icon('arrow')+'</span><span class="mto"><input value="'+esc(mp.to)+'" oninput="crmSetMap('+idx+',this.value)"/></span></div>'}).join('')+'</div>';
  if(i===6){
    if(p.id==='google_sheets')return '<div class="wiztitle">'+esc(t('wz_spreadsheet'))+'</div><p class="wizsub">'+esc(t('wz7sheet'))+'</p>'+
      '<div class="field"><label>'+esc(t('wz_spreadsheet'))+'</label><select onchange="crmSetDraft(\'account\',this.value)">'+(p.accounts||[]).map(function(a){return '<option'+(a===d.account?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select></div>'+
      '<div class="field"><label>'+esc(t('wz_worksheet'))+'</label><select onchange="crmSetDraft(\'sheet\',this.value)">'+(p.sheets||['Leads']).map(function(a){return '<option'+(a===d.sheet?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select></div>';
    if(!p.pipelines)return '<div class="wiztitle">'+esc(t('wz7'))+'</div><p class="wizsub">'+esc(tf('wz9s',{p:p.name}))+'</p><div class="testcard"><div class="row2"><span class="k">'+esc(t('cl_account'))+'</span><span class="mono">'+esc(d.account)+'</span></div></div>';
    return '<div class="wiztitle">'+esc(t('wz7'))+'</div><p class="wizsub">'+esc(tf('wz7s',{p:p.name}))+'</p>'+
      '<div class="field"><label>'+esc(t('cl_pipeline'))+'</label><select onchange="crmSetDraft(\'pipeline\',this.value)">'+(p.pipelines||[]).map(function(a){return '<option'+(a===d.pipeline?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select></div>'+
      '<div class="field"><label>'+esc(t('wz_stage'))+'</label><select onchange="crmSetDraft(\'stage\',this.value)">'+(p.stages||[]).map(function(a){return '<option'+(a===d.stage?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select></div>'+
      '<div class="field"><label>'+esc(t('wz_owner'))+'</label><select onchange="crmSetDraft(\'owner\',this.value)">'+(p.owners||[]).map(function(a){return '<option'+(a===d.owner?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select></div>';
  }
  if(i===7){var tr=d.test,inner;
    if(!tr)inner='<button class="btn btn-primary btn-lg" onclick="crmTestLead()">'+icon('send')+' '+esc(t('c_test_lead'))+'</button>';
    else inner='<div class="okpill" style="margin-bottom:10px">'+icon('check')+' '+esc(t('wz_test_ok'))+'</div><div class="testcard">'+
      '<div class="row2"><span class="k">'+esc(t('test_status'))+'</span><span class="mono">201 Created</span></div>'+
      '<div class="row2"><span class="k">'+esc(t('test_contact'))+'</span><span class="mono">#'+esc(tr.contact)+'</span></div>'+
      (tr.deal?'<div class="row2"><span class="k">'+esc(t('test_deal'))+'</span><span class="mono">#'+esc(tr.deal)+'</span></div>':'')+
      '<div class="row2"><span class="k">'+esc(t('test_time'))+'</span><span class="mono">'+esc(String(tr.time))+'ms</span></div></div>';
    return '<div class="wiztitle">'+esc(t('wz8'))+'</div><p class="wizsub">'+esc(tf('wz8s',{p:p.name}))+'</p>'+inner;}
  /* i===8 review */
  var trigs=Object.keys(d.triggers).filter(function(k){return d.triggers[k]});
  var acts=Object.keys(d.actions).filter(function(k){return d.actions[k]});
  return '<div class="wiztitle">'+esc(t('wz9'))+'</div><p class="wizsub">'+esc(tf('wz9s',{p:p.name}))+'</p><div class="testcard">'+
    '<div class="row2"><span class="k">'+esc(t('cl_account'))+'</span><span>'+esc(d.account)+'</span></div>'+
    '<div class="row2"><span class="k">'+esc(t('cl_triggers'))+'</span><span>'+trigs.length+'</span></div>'+
    '<div class="row2"><span class="k">'+esc(t('cl_actions'))+'</span><span>'+acts.length+'</span></div>'+
    (p.pipelines?'<div class="row2"><span class="k">'+esc(t('cl_pipeline'))+'</span><span>'+esc(d.pipeline+' · '+d.stage)+'</span></div>':'')+'</div>';
}
function crmWizBack(){if(!CRMWIZ)return;var min=(CRMWIZ.mode==='configure'?3:0);if(CRMWIZ.step>min){CRMWIZ.step--;crmRenderWizard()}}
function crmWizNext(){
  if(!CRMWIZ)return;var p=crmProvider(CRMWIZ.provider);
  if(CRMWIZ.step===1){var hookMode=(p.id==='generic_webhook'||p.id==='custom_api');if(!hookMode&&!CRMWIZ.draft.authed){crmSimAuth();return}}
  if(CRMWIZ.step<8){CRMWIZ.step++;crmRenderWizard();return}
  crmActivate();
}
function crmSetDraft(k,v){if(CRMWIZ)CRMWIZ.draft[k]=v}
function crmSetMap(idx,v){if(CRMWIZ&&CRMWIZ.draft.mapping[idx])CRMWIZ.draft.mapping[idx].to=v}
function crmToggleSet(kind,val,el){if(!CRMWIZ)return;var d=CRMWIZ.draft[kind];d[val]=!d[val];if(el&&el.classList)el.classList.toggle('on',d[val])}
function crmSimAuth(){if(!CRMWIZ)return;var p=crmProvider(CRMWIZ.provider);CRMWIZ.draft.authed=true;if(!CRMWIZ.draft.account)CRMWIZ.draft.account=(p.accounts&&p.accounts[0])||'Connected account';crmRenderWizard()}
function crmTestLead(){if(!CRMWIZ)return;var p=crmProvider(CRMWIZ.provider),ext={contact:crmExtId(p.id,'contact')};if(CRMWIZ.draft.actions.deal)ext.deal=crmExtId(p.id,'deal');CRMWIZ.draft.test={contact:ext.contact,deal:ext.deal||'',time:120+Math.floor(Math.random()*240)};CRMWIZ.draft.tested=true;crmRenderWizard()}
function crmActivate(){
  if(!CRMWIZ)return;var st=crmState(),p=crmProvider(CRMWIZ.provider),d=CRMWIZ.draft;
  var trigs=Object.keys(d.triggers).filter(function(k){return d.triggers[k]});
  var acts=Object.keys(d.actions).filter(function(k){return d.actions[k]});
  if(CRMWIZ.mode==='configure'){
    var c=crmFindConn(st,CRMWIZ.connId);
    if(c){c.triggers=trigs;c.actions=acts;c.mapping=d.mapping;c.pipeline=d.pipeline;c.stage=d.stage;c.owner=d.owner;c.account=d.account;c.tested_at=Date.now()}
    crmSave(st);crmCloseModal();render();toast(t('wz_save'));return;
  }
  var conn={id:'conn_'+crmRand(10),provider:p.id,name:p.name,status:'connected',account:d.account,
    portal:(p.id==='hubspot'?String(20000000+Math.floor(Math.random()*9000000)):''),
    sync_enabled:true,triggers:trigs,actions:acts,pipeline:d.pipeline,stage:d.stage,owner:d.owner,sheet:d.sheet,
    tags:d.tags||[],mapping:d.mapping,synced:0,last_success:null,last_failure:null,last_error:null,connected_at:Date.now(),tested_at:Date.now(),health:'healthy'};
  st.conns.push(conn);crmSave(st);crmCloseModal();
  try{getLeads().slice(0,3).forEach(function(l){crmEmit('lead.created',l)})}catch(e){}
  render();toast(tf('toast_connected',{p:p.name}));
}
function crmViewEvent(evId){
  var st=crmState(),ev=null;for(var i=0;i<st.events.length;i++){if(st.events[i].event_id===evId){ev=st.events[i];break}}
  var m=crmModalEl();if(!m)return;
  var body=(ev&&ev.body)?ev.body:'';
  if(!body){var lead=getLeads().filter(function(l){return l.id===(ev?ev.entity_id:null)})[0];if(lead)body=JSON.stringify(crmEnvelope((ev?ev.event_type:'lead.created'),lead,null))}
  var pretty=body;try{pretty=JSON.stringify(JSON.parse(body),null,2)}catch(e){}
  var ts=ev?ev.ts:Math.floor(Date.now()/1000),sig=ev?ev.sig:'sha256=…';
  var headers='POST /webhook/crm-router  HTTP/1.1\nContent-Type: application/json\nX-Alsaiti-Event-ID: '+(ev?ev.event_id:'')+'\nX-Alsaiti-Event-Type: '+(ev?ev.event_type:'')+'\nX-Alsaiti-Timestamp: '+ts+'\nX-Alsaiti-Signature: '+sig;
  m.innerHTML='<div class="modal" onclick="if(event.target===this)crmCloseModal()"><div class="modalcard"><div class="modalhead">'+icon('shield')+'<h3>'+esc(t('ev_title'))+'</h3><button class="modalx" onclick="crmCloseModal()">'+icon('close')+'</button></div>'+
    '<div class="modalbody"><div class="wizlabel">'+esc(t('ev_headers'))+'</div><div class="codebox" style="margin:8px 0 16px">'+esc(headers)+'</div>'+
    '<div class="wizlabel">'+esc(t('ev_payload'))+'</div><div class="codebox" style="margin-top:8px">'+esc(pretty)+'</div></div></div></div>';
}

/* ---- Lead-level CRM sync (badges + card) ---- */
function crmLeadSyncs(leadId){var st=crmState(),out=[];Object.keys(st.syncs).forEach(function(k){var r=st.syncs[k];if(r.lead_id===leadId){var c=crmFindConn(st,r.connection_id);if(c&&c.status!=='disconnected')out.push(r)}});return out}
function crmLeadBadge(leadId){
  var syncs=crmLeadSyncs(leadId);if(!syncs.length)return '';
  var anyFail=syncs.some(function(r){return r.status==='failed'});
  var anySync=syncs.some(function(r){return r.status==='synced'});
  var cls,lbl,ic;
  if(anyFail){cls='sy-failed';lbl=t('sync_failed');ic='close'}
  else if(anySync){cls='sy-synced';lbl=t('sync_synced');ic='check'}
  else{cls='sy-pending';lbl=t('sync_pending');ic='clock'}
  return '<span class="syb '+cls+'">'+icon(ic)+' '+esc(lbl)+'</span>';
}
function crmLeadCard(lead){
  var syncs=crmLeadSyncs(lead.id),inner;
  if(!syncs.length)inner='<p class="muted" style="font-size:13px">'+esc(t('crm_none_lead'))+'</p>';
  else inner=syncs.map(function(r){
    var p=crmProvider(r.provider)||{name:r.provider,accent:'#3AA6FF',icon:'crm'},ok=r.status==='synced';
    var idline=ok?((r.ext.contact?('#'+r.ext.contact):'')+(r.ext.deal?(' · deal #'+r.ext.deal):'')):(r.error?r.error.code:'');
    return '<div class="syncrec">'+crmLogo(p)+'<div class="sm"><div class="t">'+esc(p.name)+' <span class="syb '+(ok?'sy-synced':'sy-failed')+'" style="margin-left:6px">'+icon(ok?'check':'close')+' '+esc(ok?t('sync_synced'):t('sync_failed'))+'</span></div><div class="d">'+esc(idline)+'</div></div>'+
      (ok?(r.url?'<a class="btn btn-sm" href="'+esc(r.url)+'" target="_blank" rel="noopener noreferrer">'+icon('external')+'</a>':''):'<button class="btn btn-sm" onclick="crmRetry(\''+r.connection_id+'\',\''+lead.id+'\')">'+icon('refresh')+' '+esc(t('c_retry'))+'</button>')+'</div>';
  }).join('');
  return '<div class="card"><h3>'+esc(t('crm_sync'))+'</h3>'+inner+'</div>';
}

/* expose */
window.go=go;window.openLead=openLead;window.toggleMenu=toggleMenu;window.doLogout=doLogout;
window.crmOpenWizard=crmOpenWizard;window.crmConfigure=crmConfigure;window.crmCloseModal=crmCloseModal;window.crmWizNext=crmWizNext;window.crmWizBack=crmWizBack;
window.crmSetDraft=crmSetDraft;window.crmSetMap=crmSetMap;window.crmToggleSet=crmToggleSet;window.crmSimAuth=crmSimAuth;window.crmTestLead=crmTestLead;window.crmViewEvent=crmViewEvent;
window.crmTestConn=crmTestConn;window.crmPause=crmPause;window.crmResume=crmResume;window.crmDisconnect=crmDisconnect;window.crmRetry=crmRetry;
window.submitAuth=submitAuth;window.submitLead=submitLead;window.setFilter=setFilter;window.moveStatus=moveStatus;
window.saveNote=saveNote;window.deleteLead=deleteLead;window.saveProfile=saveProfile;window.resetData=resetData;
window.liveSearch=liveSearch;window.voiceStart=voiceStart;window.voiceSend=voiceSend;window.voiceListen=voiceListen;window.voiceEnd=voiceEnd;window.voiceMic=voiceMic;
window.demoLogin=demoLogin;window.setLang=setLang;window.scrollToId=scrollToId;window.submitContactForm=submitContactForm;

applyDir();
render();
</script>
